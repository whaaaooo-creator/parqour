<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour Auto Report</title>
<link rel="stylesheet" href="style.css?v=8">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
<style>
.fetch-grid{display:grid;gap:12px}
.fetch-actions{display:grid;gap:10px;grid-template-columns:1fr}
.fetch-note{font-size:12px;line-height:1.4;color:var(--muted)}
.fetch-status{margin-top:8px;font-size:13px;color:#cfd3db;min-height:18px}
.fetch-primary{background:#1f4530 !important;border-color:#335c45 !important}
.auto-box{margin-top:12px;display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,0.03)}
.auto-box input{width:18px;height:18px;accent-color:#2b74ff}
.auto-box label{font-size:14px;color:#e8ebf2;cursor:pointer;line-height:1.35}
.auto-help{margin-top:6px;font-size:12px;color:var(--muted)}
@media (min-width:700px){
  .fetch-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a class="home" href="index.html" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
      <button id="btnAZ" onclick="__setLang('az')">AZ</button>
    </div>
  </div>

  <div class="card">
    <div class="fetch-grid">
      <div class="field">
        <label id="lblStart" for="startDT"></label>
        <input id="startDT" class="num" type="datetime-local" />
      </div>
      <div class="field">
        <label id="lblEnd" for="endDT"></label>
        <input id="endDT" class="num" type="datetime-local" />
      </div>
    </div>
    <div class="fetch-actions" style="margin-top:12px">
      <button class="full fetch-primary" id="runBtn"></button>
    </div>
    <div class="auto-box">
      <input id="autoShift" type="checkbox" checked>
      <label for="autoShift" id="lblAutoShift"></label>
    </div>
    <div class="auto-help" id="autoHelp"></div>
    <div class="fetch-status" id="status"></div>
    <div class="fetch-note" id="note1" style="margin-top:10px"></div>
    <div class="fetch-note" id="note2" style="margin-top:6px"></div>
  </div>

  <div class="card copywrap" style="margin-top:12px">
    <textarea class="ta" id="out" placeholder=""></textarea>
  </div>
</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const KOROGLU_BASE = 'https://bhk.parqour.com';
const YANVAR20_BASE = 'https://bh20.parqour.com';
const LSTR_KEY = 'autofetch_range';
const AUTO_SHIFT_KEY = 'autofetch_auto_shift';
const AUTO_TICK_MS = 30000;
const t = {
  ru: {
    start:'Начало', end:'Конец', run:'Загрузить и скопировать', copied:'Скопировано!', running:'Получаю данные…', ready:'Данные получены и скопированы.',
    failed:'Не удалось получить данные.',
    note1:'Лучше работает, когда вы уже вошли в обе системы Parqour в этом браузере.',
    note2:'Если хост блокирует cross origin запросы, эту страницу нужно размещать на том же сайте или API должен разрешать CORS.',
    placeholder:'Готовый текст появится здесь…',
    cors:'Запрос заблокирован. Скорее всего, нет входа в систему или этот хост приложения не имеет доступа к API.',
    autoShift:'Авто смена 08:00 / 20:00',
    autoHelp:'Когда включено, страница сама подставляет ближайшую смену и обновляет время при возврате на страницу.'
  },
  az: {
    start:'Başlanğıc', end:'Son', run:'Yüklə və kopyala', copied:'Kopyalandı!', running:'Məlumatlar yüklənir…', ready:'Məlumatlar alındı və kopyalandı.',
    failed:'Məlumatları almaq olmadı.',
    note1:'Bu brauzerdə hər iki Parqour sisteminə əvvəlcədən daxil olmusunuzsa daha yaxşı işləyir.',
    note2:'Host cross origin sorğuları bloklayırsa, bu səhifə eyni saytda yerləşməlidir və ya API CORS icazəsi verməlidir.',
    placeholder:'Hazır mətn burada görünəcək…',
    cors:'Sorğu bloklandı. Böyük ehtimalla giriş yoxdur və ya bu tətbiq hostunun API girişinə icazəsi yoxdur.',
    autoShift:'08:00 / 20:00 avtomatik növbə',
    autoHelp:'Bu aktivdirsə, səhifə ən yaxın növbəni özü seçir və səhifəyə qayıdanda vaxtı yeniləyir.'
  }
};
const $ = (id) => document.getElementById(id);
const lang = () => (window.__lang === 'az' ? 'az' : 'ru');
const tr = (k) => (t[lang()] || t.ru)[k] || k;
const OBJECTS = [
  {
    base: KOROGLU_BASE,
    title: 'Браво Короглу',
    parkingLine: 'На парковкe',
    freeLine: 'Закрытиe бесплатных сессий:0',
    paidLine: 'Закрытие платных сессий:0'
  },
  {
    base: YANVAR20_BASE,
    title: 'Браво 20 январ',
    parkingLine: 'На парковке',
    freeLine: 'Бесплатный сессии закрыто:0',
    paidLine: 'Платных сессий закрыто:0'
  }
];

function pad(n){ return String(n).padStart(2,'0'); }
function dtLocal(date){
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function getNearestShiftRange(now = new Date()){
  const bases = [];
  for(let d=-1; d<=1; d++){
    const baseDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + d, 0, 0, 0, 0);
    bases.push(new Date(baseDay.getFullYear(), baseDay.getMonth(), baseDay.getDate(), 8, 0, 0, 0));
    bases.push(new Date(baseDay.getFullYear(), baseDay.getMonth(), baseDay.getDate(), 20, 0, 0, 0));
  }
  let nearest = bases[0];
  let best = Math.abs(now - nearest);
  for(const candidate of bases){
    const diff = Math.abs(now - candidate);
    if(diff < best){
      best = diff;
      nearest = candidate;
    }
  }
  const end = new Date(nearest.getTime() + 12 * 60 * 60 * 1000);
  return { start: nearest, end };
}
function loadAutoShift(){
  const raw = localStorage.getItem(AUTO_SHIFT_KEY);
  return raw === null ? true : raw === '1';
}
function saveAutoShift(){
  localStorage.setItem(AUTO_SHIFT_KEY, $('autoShift').checked ? '1' : '0');
}
function applyAutoShift(force = false){
  if(!$('autoShift').checked) return false;
  const range = getNearestShiftRange();
  const nextStart = dtLocal(range.start);
  const nextEnd = dtLocal(range.end);
  const changed = $('startDT').value !== nextStart || $('endDT').value !== nextEnd;
  if(force || changed){
    $('startDT').value = nextStart;
    $('endDT').value = nextEnd;
    saveRange();
    return true;
  }
  return false;
}
function loadDefaults(){
  $('autoShift').checked = loadAutoShift();
  if($('autoShift').checked){
    applyAutoShift(true);
    return;
  }
  try{
    const saved = JSON.parse(localStorage.getItem(LSTR_KEY) || 'null');
    if(saved && saved.start && saved.end){
      $('startDT').value = saved.start;
      $('endDT').value = saved.end;
      return;
    }
  }catch(e){}
  const range = getNearestShiftRange();
  $('startDT').value = dtLocal(range.start);
  $('endDT').value = dtLocal(range.end);
}
function saveRange(){
  localStorage.setItem(LSTR_KEY, JSON.stringify({start:$('startDT').value, end:$('endDT').value}));
}
function applyLang(){
  $('lblStart').textContent = tr('start');
  $('lblEnd').textContent = tr('end');
  $('runBtn').textContent = tr('run');
  $('note1').textContent = tr('note1');
  $('note2').textContent = tr('note2');
  $('out').placeholder = tr('placeholder');
  $('toast').textContent = tr('copied');
  $('lblAutoShift').textContent = tr('autoShift');
  $('autoHelp').textContent = tr('autoHelp');
  $('btnRU').classList.toggle('active', lang()==='ru');
  $('btnAZ').classList.toggle('active', lang()==='az');
}
function setStatus(text){ $('status').textContent = text || ''; }
function showToast(text){
  const el = $('toast');
  el.textContent = text || tr('copied');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1500);
}
async function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = $('out');
  ta.focus();
  ta.select();
  document.execCommand('copy');
}
function withYear2020(startValue){
  if(!startValue) return startValue;
  return startValue.replace(/^\d{4}/, '2020');
}
function makeCarStatePayload(dateFromString, dateToString, inParking){
  return {
    draw: 1,
    columns: [
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'dimension',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'inTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'inGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'outTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'outGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'duration',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column:3,dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false},
    customFilters:{
      dateFromString,
      dateToString,
      plateNumber:'',
      amount:'',
      inGateId:'',
      outGateId:'',
      inParking:!!inParking,
      carOutType:'',
      carEntryType:''
    }
  };
}
function makeEventsPayload(){
  return {
    draw: 1,
    columns: [
      {data:'id',name:'',searchable:false,orderable:true,search:{value:'',regex:false}},
      {data:'plateNumber',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'created',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'description',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'eventType',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'gate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'imgUrl',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column:0,dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false}
  };
}
async function postJson(base, url, payload, refererPath){
  const headers = {
    'accept':'application/json, text/javascript, */*; q=0.01',
    'content-type':'application/json',
    'x-requested-with':'XMLHttpRequest'
  };
  const extra = {};
  try{ extra.referrer = base + refererPath; }catch(e){}
  let res;
  try{
    res = await fetch(url, {
      method:'POST',
      credentials:'include',
      mode:'cors',
      headers,
      body: JSON.stringify(payload),
      ...extra
    });
  }catch(err){
    const e = new Error(tr('cors'));
    e.cause = err;
    throw e;
  }
  if(!res.ok){
    throw new Error(`HTTP ${res.status}`);
  }
  return res.json();
}
function extractCount(obj){
  if(obj && typeof obj.recordsFiltered === 'number') return obj.recordsFiltered;
  if(obj && typeof obj.recordsTotal === 'number') return obj.recordsTotal;
  if(obj && Array.isArray(obj.data)) return obj.data.length;
  return 0;
}
async function fetchObjectStats(cfg, start, end){
  const parkingStart = withYear2020(start);
  const normal = await postJson(cfg.base, `${cfg.base}/rest/carstate`, makeCarStatePayload(start, end, false), '/journal/list?lang=ru');
  const inside = await postJson(cfg.base, `${cfg.base}/rest/carstate`, makeCarStatePayload(parkingStart, end, true), '/journal/list?lang=ru');
  const manual = await postJson(cfg.base, `${cfg.base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=`, makeEventsPayload(), '/events/list?lang=ru');
  const notFound = await postJson(cfg.base, `${cfg.base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=1`, makeEventsPayload(), '/events/list?lang=ru');
  return {
    period: extractCount(normal),
    notFound: extractCount(notFound),
    inParking: extractCount(inside),
    manualOpen: extractCount(manual)
  };
}
function formatRuBlock(cfg, stats){
  return [
    cfg.title,
    `Машин за период:${stats.period}`,
    `Не найдены:${stats.notFound}`,
    `${cfg.parkingLine}:${stats.inParking}`,
    `Ручных открытий:${stats.manualOpen}`,
    cfg.freeLine,
    cfg.paidLine
  ].join('\n');
}
function formatRuReport(start, end, results){
  return [
    start.replace('T',' '),
    end.replace('T',' '),
    '',
    formatRuBlock(OBJECTS[0], results[0]),
    '',
    formatRuBlock(OBJECTS[1], results[1]),
    '',
    'Тикеты: 0'
  ].join('\n');
}
async function runFetch(){
  const start = $('startDT').value;
  const end = $('endDT').value;
  if(!start || !end){ setStatus(''); return; }
  saveRange();
  setStatus(tr('running'));
  $('runBtn').disabled = true;
  try{
    const results = [];
    for(const cfg of OBJECTS){
      results.push(await fetchObjectStats(cfg, start, end));
    }
    const text = formatRuReport(start, end, results);
    $('out').value = text;
    await copyText(text);
    setStatus(tr('ready'));
    showToast(tr('copied'));
  }catch(err){
    console.error(err);
    const msg = err && err.message ? err.message : tr('failed');
    setStatus(msg);
    $('out').value = 'ERROR\n\n' + msg;
  }finally{
    $('runBtn').disabled = false;
  }
}
loadDefaults();
applyLang();
$('runBtn').addEventListener('click', runFetch);
$('startDT').addEventListener('change', () => { if(!$('autoShift').checked) saveRange(); });
$('endDT').addEventListener('change', () => { if(!$('autoShift').checked) saveRange(); });
$('autoShift').addEventListener('change', () => {
  saveAutoShift();
  if($('autoShift').checked){
    applyAutoShift(true);
  }
});
const refreshShiftIfNeeded = () => {
  if(document.visibilityState === 'hidden') return;
  applyAutoShift(false);
};
window.addEventListener('focus', refreshShiftIfNeeded);
document.addEventListener('visibilitychange', refreshShiftIfNeeded);
window.addEventListener('pageshow', refreshShiftIfNeeded);
setInterval(refreshShiftIfNeeded, AUTO_TICK_MS);
</script>
<script src="pwa-update.js"></script>
</body>
</html>
