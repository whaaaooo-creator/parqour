<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour — Support 2</title>
<link rel="stylesheet" href="style.css?v=11">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container">
  <div class="header">
    <a class="home" href="index.html" aria-label="Главная">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
  </div>

  <input id="startDT" type="hidden" />
  <input id="endDT" type="hidden" />

  <div class="card reportcard">
    <div class="reportactions">
      <button class="clearfab" id="resetAll" aria-label="Сбросить счётчики" title="Сбросить счётчики"><svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v11zm3.5-8h1.5v7h-1.5v-7zm5 0H16v7h-1.5v-7z"/><path d="M9 4V3h6v1h5v2H4V4h5z"/></svg></button>
      <button aria-label="Обновить" class="updatefab" id="updateNow" title="Обновить"><svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5 0 1.05-.32 2.02-.86 2.83l1.46 1.46C18.54 16.08 19 14.59 19 13c0-3.87-3.13-7-7-7zm-5 3.17C5.46 7.92 5 9.41 5 11c0 3.87 3.13 7 7 7v3l4-4-4-4v3c-2.76 0-5-2.24-5-5 0-1.05.32-2.02.86-2.83L6.4 9.17z"/></svg></button>
      <button aria-label="Копировать" class="copyfab" id="copy" title="Копировать"><svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"/><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"/></svg></button>
    </div>

    <h4 class="colhead" id="pageHead" style="margin-bottom:12px">Support 2</h4>
    <div class="support2grid" id="counterGrid"></div>
  </div>

  <div class="card copywrap" style="margin-top:12px">
    <textarea class="ta" id="out" placeholder="Текст появится здесь…"></textarea>
  </div>
</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const LANG={
  ru:{title:'Support 2',copy:'Копировать',copied:'Скопировано!',update:'Обновить',updated:'Обновлено!',reset:'Сбросить счётчики',resetAsk:'Сбросить все счётчики Support 2?',resetDone:'Счётчики сброшены!',free:'Бесплатные',paid:'Платные',placeholder:'Текст появится здесь…'},
  az:{title:'Support 2',copy:'Kopyala',copied:'Kopyalandı!',update:'Yenilə',updated:'Yeniləndi!',reset:'Sayğacları sıfırla',resetAsk:'Support 2 sayğaclarının hamısı sıfırlansın?',resetDone:'Sayğaclar sıfırlandı!',free:'Pulsuz',paid:'Ödənişli',placeholder:'Mətn burada görünəcək…'}
};
const T=(k)=>((LANG[window.__lang]||LANG.ru)[k] || (LANG.ru[k] || k));
const $ = (id)=>document.getElementById(id);
const COUNT_TOTAL = 7;
const COUNTER_NAMES = [
  'East Park',
  'Konqres',
  'Jalə Plaza',
  'Bakıxanov mall',
  'Parkspot',
  'Univerium',
  'Liv Bona Dea'
];
const REPORT_NAMES_RU = [
  'Ист Парк',
  'Конгрес',
  'Джаля Плаза',
  'Бакиханов молл',
  'Паркспот',
  'Универиум',
  'Лив Бона Деа'
];

function key(type, n){
  return `support2_${type}_${n}`;
}
function getCount(type, n){
  return Number(localStorage.getItem(key(type,n)) || '0');
}
function setCount(type, n, v){
  localStorage.setItem(key(type,n), String(Math.max(0, v)));
}
function resetAllCounts(){
  for(let i=1;i<=COUNT_TOTAL;i++){
    localStorage.removeItem(key('free', i));
    localStorage.removeItem(key('paid', i));
  }
}
function pad(n){return n.toString().padStart(2,'0')}
function fmt(d){return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function atTime(date,h,m){return new Date(date.getFullYear(),date.getMonth(),date.getDate(),h,m,0,0)}
function computeShift(){
  const now=new Date();
  const startToday=atTime(now,13,0);
  const endToday=atTime(now,21,0);
  let start,end;
  if(now < startToday){
    const y=new Date(now); y.setDate(now.getDate()-1);
    start=atTime(y,13,0);
    end=atTime(y,21,0);
  } else {
    start=startToday;
    end=endToday;
  }
  $('startDT').value=fmt(start);
  $('endDT').value=fmt(end);
}
function showToast(key){
  const toast=$('toast');
  toast.textContent=T(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toast.classList.remove('show'),1500);
}
function renderCounters(){
  const grid=$('counterGrid');
  grid.innerHTML='';
  for(let i=1;i<=COUNT_TOTAL;i++){
    const freeValue=getCount('free', i);
    const paidValue=getCount('paid', i);
    const name = COUNTER_NAMES[i-1] || `Counter ${i}`;
    const card=document.createElement('div');
    card.className='card support2card';
    card.innerHTML=`
      <div class="support2title">${name}</div>
      <div class="support2split compact">
        <div class="support2side compact">
          <div class="support2meta compact">
            <div class="label">${T('free')}</div>
            <div class="count">${freeValue}</div>
          </div>
          <div class="support2buttons compact">
            <button class="full btn-inc" data-act="inc" data-type="free" data-n="${i}">+1</button>
            <button class="full btn-dec" data-act="dec" data-type="free" data-n="${i}">−1</button>
          </div>
        </div>
        <div class="support2side compact">
          <div class="support2meta compact">
            <div class="label">${T('paid')}</div>
            <div class="count">${paidValue}</div>
          </div>
          <div class="support2buttons compact">
            <button class="full btn-inc" data-act="inc" data-type="paid" data-n="${i}">+1</button>
            <button class="full btn-dec" data-act="dec" data-type="paid" data-n="${i}">−1</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }
}
function buildText(){
  const lines=[$('startDT').value.trim(), $('endDT').value.trim()];
  let hasEntries = false;
  for(let i=1;i<=COUNT_TOTAL;i++){
    const freeValue=getCount('free', i);
    const paidValue=getCount('paid', i);
    if(freeValue === 0 && paidValue === 0) continue;
    const parts=[];
    if(freeValue > 0) parts.push(`Бесплатные ${freeValue}`);
    if(paidValue > 0) parts.push(`Платные ${paidValue}`);
    lines.push('', REPORT_NAMES_RU[i-1], parts.join(' | '));
    hasEntries = true;
  }
  if(!hasEntries){
    lines.push('');
  }
  $('out').value=lines.join('\n');
}
function applyLang(){
  $('pageHead').textContent=T('title');
  $('copy').setAttribute('title', T('copy'));
  $('copy').setAttribute('aria-label', T('copy'));
  $('updateNow').setAttribute('title', T('update'));
  $('updateNow').setAttribute('aria-label', T('update'));
  $('resetAll').setAttribute('title', T('reset'));
  $('resetAll').setAttribute('aria-label', T('reset'));
  $('out').setAttribute('placeholder', T('placeholder'));
}

document.addEventListener('click', (e)=>{
  const btn=e.target.closest('button[data-act]');
  if(!btn) return;
  const n=Number(btn.dataset.n);
  const type=btn.dataset.type;
  const delta=btn.dataset.act==='inc' ? 1 : -1;
  setCount(type, n, getCount(type, n)+delta);
  renderCounters();
  buildText();
});

document.getElementById('updateNow').addEventListener('click', ()=>{
  computeShift();
  buildText();
  showToast('updated');
});

document.getElementById('resetAll').addEventListener('click', ()=>{
  if(!confirm(T('resetAsk'))) return;
  resetAllCounts();
  renderCounters();
  buildText();
  showToast('resetDone');
});

document.getElementById('copy').addEventListener('click', async ()=>{
  const text = $('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    $('out').focus();
    $('out').select();
    document.execCommand('copy');
  }
  showToast('copied');
});

applyLang();
computeShift();
renderCounters();
buildText();
window.addEventListener('focus', ()=>{ computeShift(); buildText(); });
setInterval(()=>{ computeShift(); buildText(); }, 60000);
</script>
<script src="pwa-update.js"></script>
</body>
</html>
