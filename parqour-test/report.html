<style>
.report-top-actions{position:absolute;right:14px;top:14px;display:flex;justify-content:flex-end;gap:8px;align-items:center;transform:none;z-index:2}
.report-headbtn{color:var(--text-soft)}
#updateNow{display:none !important}
.reportfetchcard{padding:14px 14px 12px;margin-bottom:12px}.report-fetch-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}.report-fetch-actions{margin-top:10px}.reportcard{position:relative;padding-top:14px}

@media (max-width:640px){.report-fetch-grid{grid-template-columns:1fr}}
@media (max-width:520px){.report-compact-wrap .ta{min-height:84px;font-size:12.5px;padding:9px 10px}}

<body>
<div class="container">
  <div class="header">
    <a aria-label="Главная" class="home" href="index.html?v=20260414pro6">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"></path></svg>
    </a>
    <img alt="Parqour" src="parqour.png"/>
  </div>

  <div class="card reportfetchcard">
    <div class="fetch-grid report-fetch-grid">
      <div class="field">
        <label id="lblStart" for="startDT"></label>
        <input id="startDT" class="num" type="datetime-local" />
      </div>
      <div class="field">
        <label id="lblEnd" for="endDT"></label>

    <div class="fetch-actions report-fetch-actions">
      <button class="full fetch-primary" id="runAuto"></button>

      <button aria-label="Копировать" class="report-headbtn" id="copy" title="Копировать"><svg aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"/><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"/></svg></button>
    </div>
    <div class="cols">
      <div class="report-col">
        <h4 class="colhead" id="bHead">Babek</h4>
        <div class="field"><label id="lb1">Cars during period</label><input id="bb_period" min="0" type="number"/></div>
        <div class="field"><label id="lb2">On parking</label><input id="bb_onparking" min="0" type="number"/></div>
        <div class="field"><label id="lb3">Manual openings</label><input id="bb_manual" min="0" type="number"/></div>
        <div class="field"><label id="lb4">Not found</label><input id="bb_notfound" min="0" type="number"/></div>
        <div class="field"><label id="lb5">Close free sessions</label><input id="bb_close_free" min="0" type="number"/></div>
        <div class="field"><label id="lb6">Close paid sessions</label><input id="bb_close_paid" min="0" type="number"/></div>
      </div>

      <div class="report-col">
        <h4 class="colhead" id="lHead">Bailova</h4>
        <div class="field"><label id="ll1">Cars during period</label><input id="bl_period" min="0" type="number"/></div>
        <div class="field"><label id="ll2">On parking</label><input id="bl_onparking" min="0" type="number"/></div>
        <div class="field"><label id="ll3">Manual openings</label><input id="bl_manual" min="0" type="number"/></div>
        <div class="field"><label id="ll4">Not found</label><input id="bl_notfound" min="0" type="number"/></div>
        <div class="field"><label id="ll5">Close free sessions</label><input id="bl_close_free" min="0" type="number"/></div>
        <div class="field"><label id="ll6">Close paid sessions</label><input id="bl_close_paid" min="0" type="number"/></div>
      </div>

      <div class="tickets-row">
        <h4 id="ticketsH" style="margin:0 0 8px 0">Tickets</h4>
        <div class="field"><label id="ticketsL">Count</label><input id="tickets" min="0" type="number"/></div>
      </div>
    </div>
  </div>

  <div class="card copywrap report-compact-wrap">
    <textarea class="ta" id="out" placeholder="Текст появится здесь…"></textarea>
  </div>
</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const t={
  ru:{babek:'Бабек',bail:'Баилова',cars:'Машин за период',park:'На парковке',manual:'Ручных открытий',nf:'Не найдены',cf:'Закрытие бесплатных сессий',cp:'Закрытие платных сессий',tickets:'Тикеты',count:'Количество',copy:'Копировать',copied:'Скопировано!',update:'Обновить',updated:'Обновлено!',placeholder:'Текст появится здесь…',start:'Начало',end:'Конец',run:'Загрузить автоотчёт',running:'Получаю данные…',ready:'Данные получены.',failed:'Не удалось получить данные.'},
  az:{babek:'Babek',bail:'Bailova',cars:'Dövr üzrə maşınlar',park:'Parkda olanlar',manual:'Əl ilə açılışlar',nf:'Tapılmayanlar',cf:'Bağlanan pulsuz sessiyalar',cp:'Bağlanan ödənişli sessiyalar',tickets:'Tiketlər',count:'Say',copy:'Kopyala',copied:'Kopyalandı!',update:'Yenilə',updated:'Yeniləndi!',placeholder:'Mətn burada görünəcək…',start:'Başlanğıc',end:'Son',run:'Avtohesabatı yüklə',running:'Məlumatlar alınır…',ready:'Məlumatlar alındı.',failed:'Məlumatları almaq olmadı.'}
};
const L=(k)=>((t[window.__lang]||t.ru)[k]);
function applyLang(){
  document.getElementById('bHead').textContent=L('babek');
  document.getElementById('lHead').textContent=L('bail');
  ['lb1','ll1'].forEach(id=>document.getElementById(id).textContent=L('cars'));
  ['lb2','ll2'].forEach(id=>document.getElementById(id).textContent=L('park'));
  ['lb3','ll3'].forEach(id=>document.getElementById(id).textContent=L('manual'));
  ['lb4','ll4'].forEach(id=>document.getElementById(id).textContent=L('nf'));
  ['lb5','ll5'].forEach(id=>document.getElementById(id).textContent=L('cf'));
  ['lb6','ll6'].forEach(id=>document.getElementById(id).textContent=L('cp'));
  document.getElementById('lblStart').textContent=L('start');
  document.getElementById('lblEnd').textContent=L('end');
  document.getElementById('runAuto').textContent=L('run');
  document.getElementById('ticketsH').textContent=L('tickets');
  document.getElementById('ticketsL').textContent=L('count');
  document.getElementById('copy').setAttribute('title', L('copy'));
  document.getElementById('copy').setAttribute('aria-label', L('copy'));
  document.getElementById('updateNow').setAttribute('title', L('update'));
  document.getElementById('updateNow').setAttribute('aria-label', L('update'));
  document.getElementById('toast').textContent=L('copied');
  document.getElementById('out').setAttribute('placeholder', L('placeholder'));
}
applyLang();

function pad(n){return n.toString().padStart(2,'0')}
function fmt(d){return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function dtLocal(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`}
function formatRuDate(value){
  if(!value) return '';
  const [datePart,timePart='00:00']=value.split('T');
  const [y,m,d]=datePart.split('-');
  return `${d}.${m}.${y} ${timePart}`;
}
function getNearestShiftRange(now=new Date()){
  const points=[];
  for(let d=-1; d<=1; d++){
    const day=new Date(now.getFullYear(),now.getMonth(),now.getDate()+d,0,0,0,0);
    points.push(new Date(day.getFullYear(),day.getMonth(),day.getDate(),7,0,0,0));
    points.push(new Date(day.getFullYear(),day.getMonth(),day.getDate(),19,0,0,0));
  }
  let nearest=points[0];
  let best=Math.abs(now-nearest);
  for(const point of points){
    const diff=Math.abs(now-point);
    if(diff<best){ best=diff; nearest=point; }
  }
  let start,end;
  if(nearest.getHours()===19){
    start=new Date(nearest.getFullYear(),nearest.getMonth(),nearest.getDate(),19,0,0,0);
    end=new Date(start.getTime()+12*60*60*1000);
  }else{
    end=new Date(nearest.getFullYear(),nearest.getMonth(),nearest.getDate(),7,0,0,0);
    start=new Date(end.getTime()-12*60*60*1000);
  }
  return {start,end};
}
function applyAutoShift(force=false){
  const range=getNearestShiftRange();
  const nextStart=dtLocal(range.start);
  const nextEnd=dtLocal(range.end);
  const changed=document.getElementById('startDT').value!==nextStart || document.getElementById('endDT').value!==nextEnd;
  if(force || changed){
    document.getElementById('startDT').value=nextStart;
    document.getElementById('endDT').value=nextEnd;
    return true;
  }
  return false;
}
function val(id){
  const el=document.getElementById(id);
  const v=el.value;
  return (v===''||isNaN(+v)) ? 0 : +v;
}

function showToast(key){
  const toast=document.getElementById('toast');
  toast.textContent=L(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function buildText(){
  const s=document.getElementById('startDT').value.trim();
  const e=document.getElementById('endDT').value.trim();
  const bb={p:val('bb_period'),on:val('bb_onparking'),m:val('bb_manual'),nf:val('bb_notfound'),cf:val('bb_close_free'),cp:val('bb_close_paid')};
  const bl={p:val('bl_period'),on:val('bl_onparking'),m:val('bl_manual'),nf:val('bl_notfound'),cf:val('bl_close_free'),cp:val('bl_close_paid')};
  const tickets=val('tickets');
  const lines=[
    formatRuDate(s),
    formatRuDate(e),
    '',
    'Браво Бабек',
    `Машин за период: ${bb.p}`,
    `Не найдены: ${bb.nf}`,
    `На парковке: ${bb.on}`,
    `Ручных открытий: ${bb.m}`,
    `Закрытие бесплатных сессий: ${bb.cf}`,
    `Закрытие платных сессий: ${bb.cp}`,
    '',
    'Браво Баилова',
    `Машин за период: ${bl.p}`,
    `Не найдены: ${bl.nf}`,
    `На парковке: ${bl.on}`,
    `Ручных открытий: ${bl.m}`,
    `Закрытие бесплатных сессий: ${bl.cf}`,
    `Закрытие платных сессий: ${bl.cp}`,
    '',
    '',
    `Тикеты: ${tickets}`
  ];
  document.getElementById('out').value=lines.join('\n');
}

const BABEK_BASE='https://bhb.parqour.com';
const BAILOVA_BASE='https://bb.parqour.com';
function setStatus(text){ document.getElementById('status').textContent=text || ''; }
function makeCarStatePayload(dateFromString, dateToString, inParking, extras={}){
  return {
    draw:1,
    columns:[
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      ...(extras.dimension ? [{data:'dimension',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}] : []),
      {data:'inTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'inGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'outTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'outGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'duration',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column: extras.orderColumn ?? 2, dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false},
    customFilters:{
      dateFromString,
      dateToString,
      plateNumber:'',
      ...(extras.dimension ? {dimension:''} : {}),
      amount:'',
      inGateId:'',
      outGateId:'',
      inParking:!!inParking,
      ...(extras.includeDepartureTime !== undefined ? {includeDepartureTime:extras.includeDepartureTime} : {}),
      carOutType:'',
      ...(extras.carEntryType ? {carEntryType:''} : {})
    }
  };
}
function makeEventsPayload(){
  return {draw:1,columns:[
      {data:'id',name:'',searchable:false,orderable:true,search:{value:'',regex:false}},
      {data:'plateNumber',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'created',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'description',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'eventType',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'gate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'imgUrl',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],order:[{column:0,dir:'desc'}],start:0,length:10,search:{value:'',regex:false}};
}
async function postJson(base, url, payload, refererPath){
  const res = await fetch(url,{method:'POST',credentials:'include',mode:'cors',headers:{'accept':'application/json, text/javascript, */*; q=0.01','content-type':'application/json','x-requested-with':'XMLHttpRequest'},body:JSON.stringify(payload),referrer:base+refererPath});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
function extractCount(obj){
  if(obj && typeof obj.recordsFiltered==='number') return obj.recordsFiltered;
  if(obj && typeof obj.recordsTotal==='number') return obj.recordsTotal;
  if(obj && Array.isArray(obj.data)) return obj.data.length;
  return 0;
}
function year2020(v){ return v ? v.replace(/^\d{4}/,'2020') : v; }
async function fetchStats(base, reasonId, extraCarOpts={}){
  const start=document.getElementById('startDT').value;
  const end=document.getElementById('endDT').value;
  const normal = await postJson(base, `${base}/rest/carstate`, makeCarStatePayload(start,end,false,extraCarOpts), '/journal/list?lang=ru');
  const inside = await postJson(base, `${base}/rest/carstate`, makeCarStatePayload(year2020(start),end,true,extraCarOpts), '/journal/list?lang=ru');
  const manual = await postJson(base, `${base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=`, makeEventsPayload(), '/events/list?lang=ru');
  const notf = await postJson(base, `${base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=${reasonId}`, makeEventsPayload(), '/events/list?lang=ru');
  return {period:extractCount(normal), onparking:extractCount(inside), manual:extractCount(manual), notfound:extractCount(notf)};
}
async function runAutoFetch(){
  setStatus(L('running'));
  document.getElementById('runAuto').disabled=true;
  try{
    const [bb, bl] = await Promise.all([
      fetchStats(BABEK_BASE, 7, {dimension:true, includeDepartureTime:false, carEntryType:true, orderColumn:3}),
      fetchStats(BAILOVA_BASE, 1, {orderColumn:2})
    ]);
    document.getElementById('bb_period').value=bb.period;
    document.getElementById('bb_onparking').value=bb.onparking;
    document.getElementById('bb_manual').value=bb.manual;
    document.getElementById('bb_notfound').value=bb.notfound;
    document.getElementById('bl_period').value=bl.period;
    document.getElementById('bl_onparking').value=bl.onparking;
    document.getElementById('bl_manual').value=bl.manual;
    document.getElementById('bl_notfound').value=bl.notfound;
    document.getElementById('tickets').value=0;
    buildText();
    setStatus(L('ready'));
    showToast('updated');
  }catch(err){
    console.error(err);
    setStatus((err && err.message) || L('failed'));
  }finally{
    document.getElementById('runAuto').disabled=false;
  }
}

const INPUT_IDS=['bb_period','bb_onparking','bb_manual','bb_notfound','bb_close_free','bb_close_paid','bl_period','bl_onparking','bl_manual','bl_notfound','bl_close_free','bl_close_paid','tickets'];
INPUT_IDS.forEach(id=>document.getElementById(id).addEventListener('input',buildText));

applyAutoShift(true);
buildText();
const refreshShiftIfNeeded=()=>{
  if(document.visibilityState==='hidden') return;
  if(applyAutoShift(false)) buildText();
  else buildText();
};
window.addEventListener('focus', refreshShiftIfNeeded);
document.addEventListener('visibilitychange', refreshShiftIfNeeded);
window.addEventListener('pageshow', refreshShiftIfNeeded);
setInterval(refreshShiftIfNeeded, 30000);

document.getElementById('updateNow').addEventListener('click', ()=>{
  applyAutoShift(true);
  buildText();
  showToast('updated');
});

document.getElementById('runAuto').addEventListener('click', runAutoFetch);
document.getElementById('copy').addEventListener('click', async ()=>{
  const text = document.getElementById('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    const ta=document.getElementById('out');
    ta.focus();
    ta.select();
    document.execCommand('copy');
  }
  showToast('copied');
});
</script>
