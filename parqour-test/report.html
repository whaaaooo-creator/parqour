<script>
const t={
  ru:{babek:'Р‘Р°Р±РµРє',bail:'Р‘Р°РёР»РѕРІР°',cars:'РњР°С€РёРЅ Р·Р° РїРµСЂРёРѕРґ',park:'РќР° РїР°СЂРєРѕРІРєРµ',manual:'Р СѓС‡РЅС‹С… РѕС‚РєСЂС‹С‚РёР№',nf:'РќРµ РЅР°Р№РґРµРЅС‹',cf:'Р—Р°РєСЂС‹С‚РёРµ Р±РµСЃРїР»Р°С‚РЅС‹С… СЃРµСЃСЃРёР№',cp:'Р—Р°РєСЂС‹С‚РёРµ РїР»Р°С‚РЅС‹С… СЃРµСЃСЃРёР№',tickets:'РўРёРєРµС‚С‹',count:'РљРѕР»РёС‡РµСЃС‚РІРѕ',copy:'РљРѕРїРёСЂРѕРІР°С‚СЊ',copied:'РЎРєРѕРїРёСЂРѕРІР°РЅРѕ!',update:'РћР±РЅРѕРІРёС‚СЊ',updated:'РћР±РЅРѕРІР»РµРЅРѕ!',placeholder:'РўРµРєСЃС‚ РїРѕСЏРІРёС‚СЃСЏ Р·РґРµСЃСЊвЂ¦'},
  az:{babek:'Babek',bail:'Bailova',cars:'DГ¶vr ГјzrЙ™ maЕџД±nlar',park:'Parkda olanlar',manual:'ЖЏl ilЙ™ aГ§Д±lД±Еџlar',nf:'TapД±lmayanlar',cf:'BaДџlanan pulsuz sessiyalar',cp:'BaДџlanan Г¶dЙ™niЕџli sessiyalar',tickets:'TiketlЙ™r',count:'Say',copy:'Kopyala',copied:'KopyalandД±!',update:'YenilЙ™',updated:'YenilЙ™ndi!',placeholder:'MЙ™tn burada gГ¶rГјnЙ™cЙ™kвЂ¦'}
};
const L=(k)=>((t[window.__lang]||t.ru)[k]);
function applyLang(){
  document.getElementById('bHead').textContent=L('babek');
  document.getElementById('lHead').textContent=L('bail');
  ['lb1','ll1'].forEach(id=>document.getElementById(id).textContent=L('cars'));
  ['lb2','ll2'].forEach(id=>document.getElementById(id).textContent=L('park'));
  ['lb3','ll3'].forEach(id=>document.getElementById(id).textContent=L('manual'));
  ['lb4','ll4'].forEach(id=>document.getElementById(id).textContent=L('nf'));
  ['lb5','ll5'].forEach(id=>document.getElementById(id).textContent=L('cf'));
  ['lb6','ll6'].forEach(id=>document.getElementById(id).textContent=L('cp'));
  document.getElementById('ticketsH').textContent=L('tickets');
  document.getElementById('ticketsL').textContent=L('count');
  document.getElementById('copy').setAttribute('title', L('copy'));
  document.getElementById('copy').setAttribute('aria-label', L('copy'));
  document.getElementById('updateNow').setAttribute('title', L('update'));
  document.getElementById('updateNow').setAttribute('aria-label', L('update'));
  document.getElementById('toast').textContent=L('copied');
  document.getElementById('out').setAttribute('placeholder', L('placeholder'));
}
applyLang();

function pad(n){return n.toString().padStart(2,'0')}
function fmt(d){return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function atTime(date,h,m){return new Date(date.getFullYear(),date.getMonth(),date.getDate(),h,m,0,0)}
function getNearestShiftRange(now=new Date()){
  const points=[];
  for(let d=-1; d<=1; d++){
    const day=new Date(now.getFullYear(),now.getMonth(),now.getDate()+d,0,0,0,0);
    points.push(new Date(day.getFullYear(),day.getMonth(),day.getDate(),7,0,0,0));
    points.push(new Date(day.getFullYear(),day.getMonth(),day.getDate(),19,0,0,0));
  }
  let nearest=points[0];
  let best=Math.abs(now-nearest);
  for(const point of points){
    const diff=Math.abs(now-point);
    if(diff<best){ best=diff; nearest=point; }
  }
  let start,end;
  if(nearest.getHours()===19){
    start=new Date(nearest.getFullYear(),nearest.getMonth(),nearest.getDate(),7,0,0,0);
    end=new Date(nearest.getFullYear(),nearest.getMonth(),nearest.getDate(),19,0,0,0);
  }else{
    end=new Date(nearest.getFullYear(),nearest.getMonth(),nearest.getDate(),7,0,0,0);
    start=new Date(end.getTime()-12*60*60*1000);
  }
  return {start,end};
}
function applyAutoShift(force=false){
  const range=getNearestShiftRange();
  const nextStart=fmt(range.start);
  const nextEnd=fmt(range.end);
  const changed=document.getElementById('startDT').value!==nextStart || document.getElementById('endDT').value!==nextEnd;
  if(force || changed){
    document.getElementById('startDT').value=nextStart;
    document.getElementById('endDT').value=nextEnd;
    return true;
  }
  return false;
}

function val(id){
  const el=document.getElementById(id);
  const v=el.value;
  return (v===''||isNaN(+v)) ? 0 : +v;
}

function showToast(key){
  const toast=document.getElementById('toast');
  toast.textContent=L(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function buildText(){
  const s=document.getElementById('startDT').value.trim();
  const e=document.getElementById('endDT').value.trim();
  const bb={p:val('bb_period'),on:val('bb_onparking'),m:val('bb_manual'),nf:val('bb_notfound'),cf:val('bb_close_free'),cp:val('bb_close_paid')};
  const bl={p:val('bl_period'),on:val('bl_onparking'),m:val('bl_manual'),nf:val('bl_notfound'),cf:val('bl_close_free'),cp:val('bl_close_paid')};
  const tickets=val('tickets');
  const lines=[
    s,
    e,
    '',
    'Р‘СЂР°РІРѕ Р‘Р°Р±РµРє',
    `РњР°С€РёРЅ Р·Р° РїРµСЂРёРѕРґ: ${bb.p}`,
    `РќРµ РЅР°Р№РґРµРЅС‹: ${bb.nf}`,
    `РќР° РїР°СЂРєРѕРІРєРµ: ${bb.on}`,
    `Р СѓС‡РЅС‹С… РѕС‚РєСЂС‹С‚РёР№: ${bb.m}`,
    `Р—Р°РєСЂС‹С‚РёРµ Р±РµСЃРїР»Р°С‚РЅС‹С… СЃРµСЃСЃРёР№: ${bb.cf}`,
    `Р—Р°РєСЂС‹С‚РёРµ РїР»Р°С‚РЅС‹С… СЃРµСЃСЃРёР№: ${bb.cp}`,
    '',
    'Р‘СЂР°РІРѕ Р‘Р°РёР»РѕРІР°',
    `РњР°С€РёРЅ Р·Р° РїРµСЂРёРѕРґ: ${bl.p}`,
    `РќРµ РЅР°Р№РґРµРЅС‹: ${bl.nf}`,
    `РќР° РїР°СЂРєРѕРІРєРµ: ${bl.on}`,
    `Р СѓС‡РЅС‹С… РѕС‚РєСЂС‹С‚РёР№: ${bl.m}`,
    `Р—Р°РєСЂС‹С‚РёРµ Р±РµСЃРїР»Р°С‚РЅС‹С… СЃРµСЃСЃРёР№: ${bl.cf}`,
    `Р—Р°РєСЂС‹С‚РёРµ РїР»Р°С‚РЅС‹С… СЃРµСЃСЃРёР№: ${bl.cp}`,
    '',
    '',
    `РўРёРєРµС‚С‹: ${tickets}`
  ];
  document.getElementById('out').value=lines.join('\n');
}

const INPUT_IDS=['bb_period','bb_onparking','bb_manual','bb_notfound','bb_close_free','bb_close_paid','bl_period','bl_onparking','bl_manual','bl_notfound','bl_close_free','bl_close_paid','tickets'];
INPUT_IDS.forEach(id=>document.getElementById(id).addEventListener('input',buildText));

applyAutoShift(true);
buildText();
const refreshShiftIfNeeded=()=>{
  if(document.visibilityState==='hidden') return;
  if(applyAutoShift(false)) buildText();
  else buildText();
};
window.addEventListener('focus', refreshShiftIfNeeded);
document.addEventListener('visibilitychange', refreshShiftIfNeeded);
window.addEventListener('pageshow', refreshShiftIfNeeded);
setInterval(refreshShiftIfNeeded, 30000);

document.getElementById('updateNow').addEventListener('click', ()=>{
  applyAutoShift(true);
  buildText();
  showToast('updated');
});

document.getElementById('copy').addEventListener('click', async ()=>{
  const text = document.getElementById('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    const ta=document.getElementById('out');
    ta.focus();
    ta.select();
    document.execCommand('copy');
  }
  showToast('copied');
});
</script>
