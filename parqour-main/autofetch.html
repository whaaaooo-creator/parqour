<!doctype html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour — Auto Report</title>
<link rel="stylesheet" href="style.css?v=2">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
<style>
.fetch-grid{display:grid;gap:12px}
.fetch-actions{display:grid;gap:10px;grid-template-columns:1fr}
.fetch-note{font-size:12px;line-height:1.4;color:var(--muted)}
.fetch-status{margin-top:8px;font-size:13px;color:#cfd3db;min-height:18px}
.fetch-primary{background:#1f4530 !important;border-color:#335c45 !important}
@media (min-width:700px){
  .fetch-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a class="home" href="index.html" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnEN" onclick="__setLang('en')">EN</button>
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
    </div>
  </div>

  <div class="card">
    <div class="fetch-grid">
      <div class="field">
        <label id="lblStart" for="startDT"></label>
        <input id="startDT" class="num" type="datetime-local" />
      </div>
      <div class="field">
        <label id="lblEnd" for="endDT"></label>
        <input id="endDT" class="num" type="datetime-local" />
      </div>
    </div>
    <div class="fetch-actions" style="margin-top:12px">
      <button class="full fetch-primary" id="runBtn"></button>
    </div>
    <div class="fetch-status" id="status"></div>
    <div class="fetch-note" id="note1" style="margin-top:10px"></div>
    <div class="fetch-note" id="note2" style="margin-top:6px"></div>
  </div>

  <div class="card copywrap" style="margin-top:12px">
    <textarea class="ta" id="out" placeholder=""></textarea>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const API_BASE = 'https://bhk.parqour.com';
const LSTR_KEY = 'autofetch_range';
const t = {
  en: {
    start:'Start', end:'End', run:'Fetch and copy', copied:'Copied!', running:'Fetching data…', ready:'Fetched and copied.',
    failed:'Fetch failed.',
    note1:'Works best when you are already logged in to the same Parqour site in this browser.',
    note2:'If the host blocks cross-origin requests, this page must be hosted under the same site or the API must allow CORS.',
    placeholder:'Generated text will appear here…',
    cors:'Request blocked. Most likely login is missing or cross-origin requests are not allowed from this app host.'
  },
  ru: {
    start:'Начало', end:'Конец', run:'Загрузить и скопировать', copied:'Скопировано!', running:'Получаю данные…', ready:'Данные получены и скопированы.',
    failed:'Не удалось получить данные.',
    note1:'Лучше работает, когда вы уже вошли в ту же систему Parqour в этом браузере.',
    note2:'Если хост блокирует cross-origin запросы, эту страницу нужно размещать на том же сайте или API должен разрешать CORS.',
    placeholder:'Сформированный текст появится здесь…',
    cors:'Запрос заблокирован. Скорее всего, нет входа в систему или этот хост приложения не имеет доступа к API.'
  }
};
const $ = (id) => document.getElementById(id);
const lang = () => (window.__lang || 'en');
const tr = (k) => (t[lang()] || t.en)[k] || k;

function pad(n){ return String(n).padStart(2,'0'); }
function dtLocal(date){
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function loadDefaults(){
  try{
    const saved = JSON.parse(localStorage.getItem(LSTR_KEY) || 'null');
    if(saved && saved.start && saved.end){
      $('startDT').value = saved.start;
      $('endDT').value = saved.end;
      return;
    }
  }catch(e){}
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0, 0);
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 0, 0, 0);
  $('startDT').value = dtLocal(start);
  $('endDT').value = dtLocal(end);
}
function saveRange(){
  localStorage.setItem(LSTR_KEY, JSON.stringify({start:$('startDT').value, end:$('endDT').value}));
}
function applyLang(){
  $('lblStart').textContent = tr('start');
  $('lblEnd').textContent = tr('end');
  $('runBtn').textContent = tr('run');
  $('note1').textContent = tr('note1');
  $('note2').textContent = tr('note2');
  $('out').placeholder = tr('placeholder');
  $('toast').textContent = tr('copied');
  const active = lang();
  $('btnEN').classList.toggle('active', active==='en');
  $('btnRU').classList.toggle('active', active==='ru');
}
function setStatus(text){ $('status').textContent = text || ''; }
function showToast(text){
  const el = $('toast');
  el.textContent = text || tr('copied');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1500);
}
async function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = $('out');
  ta.focus();
  ta.select();
  document.execCommand('copy');
}
function makeCarStatePayload(dateFromString, dateToString, inParking){
  return {
    draw: 1,
    columns: [
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'dimension',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'inTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'inGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'outTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'outGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'duration',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column:3,dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false},
    customFilters:{
      dateFromString,
      dateToString,
      plateNumber:'',
      amount:'',
      inGateId:'',
      outGateId:'',
      inParking:!!inParking,
      carOutType:'',
      carEntryType:''
    }
  };
}
function makeEventsPayload(){
  return {
    draw: 1,
    columns: [
      {data:'id',name:'',searchable:false,orderable:true,search:{value:'',regex:false}},
      {data:'plateNumber',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'created',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'description',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'eventType',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'gate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'imgUrl',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column:0,dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false}
  };
}
async function postJson(url, payload, refererPath){
  const headers = {
    'accept':'application/json, text/javascript, */*; q=0.01',
    'content-type':'application/json',
    'x-requested-with':'XMLHttpRequest'
  };
  const extra = {};
  try{ extra.referrer = API_BASE + refererPath; }catch(e){}
  let res;
  try{
    res = await fetch(url, {
      method:'POST',
      credentials:'include',
      mode:'cors',
      headers,
      body: JSON.stringify(payload),
      ...extra
    });
  }catch(err){
    const e = new Error(tr('cors'));
    e.cause = err;
    throw e;
  }
  if(!res.ok){
    throw new Error(`HTTP ${res.status}`);
  }
  const data = await res.json();
  return data;
}
function extractCount(obj){
  if(obj && typeof obj.recordsFiltered === 'number') return obj.recordsFiltered;
  if(obj && typeof obj.recordsTotal === 'number') return obj.recordsTotal;
  if(obj && Array.isArray(obj.data)) return obj.data.length;
  return 0;
}
function formatRuReport(start, end, period, inParking, manualOpen, notFound){
  return [
    start.replace('T',' '),
    end.replace('T',' '),
    '',
    `Машин за период: ${period}`,
    `На парковке: ${inParking}`,
    `Не найдены: ${notFound}`,
    `Ручных открытий: ${manualOpen}`
  ].join('\n');
}
async function runFetch(){
  const start = $('startDT').value;
  const end = $('endDT').value;
  if(!start || !end){ setStatus(''); return; }
  saveRange();
  setStatus(tr('running'));
  $('runBtn').disabled = true;
  try{
    const normal = await postJson(`${API_BASE}/rest/carstate`, makeCarStatePayload(start, end, false), '/journal/list?lang=ru');
    const inside = await postJson(`${API_BASE}/rest/carstate`, makeCarStatePayload(start, end, true), '/journal/list?lang=ru');
    const manual = await postJson(`${API_BASE}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=`, makeEventsPayload(), '/events/list?lang=ru');
    const notFound = await postJson(`${API_BASE}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=1`, makeEventsPayload(), '/events/list?lang=ru');

    const text = formatRuReport(start, end, extractCount(normal), extractCount(inside), extractCount(manual), extractCount(notFound));
    $('out').value = text;
    await copyText(text);
    setStatus(tr('ready'));
    showToast(tr('copied'));
  }catch(err){
    console.error(err);
    const msg = err && err.message ? err.message : tr('failed');
    setStatus(msg);
    $('out').value = 'ERROR\n\n' + msg;
  }finally{
    $('runBtn').disabled = false;
  }
}
loadDefaults();
applyLang();
$('runBtn').addEventListener('click', runFetch);
$('startDT').addEventListener('change', saveRange);
$('endDT').addEventListener('change', saveRange);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
