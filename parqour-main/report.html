<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport"/>
<title>Parqour — Отчёт</title>
<link href="style.css?v=6" rel="stylesheet"/>
<script src="i18n.js"></script>
<script defer src="numeric.js"></script>
<link href="icon-180.png" rel="apple-touch-icon" />
<link href="icon-192.png" rel="icon" sizes="192x192" type="image/png"/>
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container">
  <div class="header">
    <a aria-label="Главная" class="home" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"></path></svg>
    </a>
    <img alt="Parqour" src="parqour.png"/>
  </div>

  <input id="startDT" type="hidden"/>
  <input id="endDT" type="hidden"/>

  <div class="card reportcard">
    <button aria-label="Обновить" class="updatefab" id="updateNow" title="Обновить"><svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5 0 1.05-.32 2.02-.86 2.83l1.46 1.46C18.54 16.08 19 14.59 19 13c0-3.87-3.13-7-7-7zm-5 3.17C5.46 7.92 5 9.41 5 11c0 3.87 3.13 7 7 7v3l4-4-4-4v3c-2.76 0-5-2.24-5-5 0-1.05.32-2.02.86-2.83L6.4 9.17z"/></svg></button>
    <button aria-label="Копировать" class="copyfab" id="copy" title="Копировать"><svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"/><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"/></svg></button>

    <div class="cols">
      <h4 class="colhead" id="bHead">Babek</h4>
      <h4 class="colhead" id="lHead">Bailova</h4>

      <div class="block">
        <div class="field"><label id="lb1">Cars during period</label><input id="bb_period" min="0" type="number"/></div>
        <div class="field"><label id="lb2">On parking</label><input id="bb_onparking" min="0" type="number"/></div>
        <div class="field"><label id="lb3">Manual openings</label><input id="bb_manual" min="0" type="number"/></div>
        <div class="field"><label id="lb4">Not found</label><input id="bb_notfound" min="0" type="number"/></div>
        <div class="field"><label id="lb5">Close free sessions</label><input id="bb_close_free" min="0" type="number"/></div>
        <div class="field"><label id="lb6">Close paid sessions</label><input id="bb_close_paid" min="0" type="number"/></div>
      </div>

      <div class="block">
        <div class="field"><label id="ll1">Cars during period</label><input id="bl_period" min="0" type="number"/></div>
        <div class="field"><label id="ll2">On parking</label><input id="bl_onparking" min="0" type="number"/></div>
        <div class="field"><label id="ll3">Manual openings</label><input id="bl_manual" min="0" type="number"/></div>
        <div class="field"><label id="ll4">Not found</label><input id="bl_notfound" min="0" type="number"/></div>
        <div class="field"><label id="ll5">Close free sessions</label><input id="bl_close_free" min="0" type="number"/></div>
        <div class="field"><label id="ll6">Close paid sessions</label><input id="bl_close_paid" min="0" type="number"/></div>
      </div>

      <div class="block" style="grid-column:1 / -1;margin-top:10px">
        <h4 id="ticketsH" style="margin:0 0 8px 0">Tickets</h4>
        <div class="field"><label id="ticketsL">Count</label><input id="tickets" min="0" type="number"/></div>
      </div>
    </div>
  </div>

  <div class="card copywrap" style="margin-top:12px">
    <textarea class="ta" id="out" placeholder="Текст появится здесь…"></textarea>
  </div>
</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const t={
  ru:{babek:'Бабек',bail:'Баилова',cars:'Машин за период',park:'На парковке',manual:'Ручных открытий',nf:'Не найдены',cf:'Закрытие бесплатных сессий',cp:'Закрытие платных сессий',tickets:'Тикеты',count:'Количество',copy:'Копировать',copied:'Скопировано!',update:'Обновить',updated:'Обновлено!',placeholder:'Текст появится здесь…'},
  az:{babek:'Babek',bail:'Bailova',cars:'Dövr üzrə maşınlar',park:'Parkda olanlar',manual:'Əl ilə açılışlar',nf:'Tapılmayanlar',cf:'Bağlanan pulsuz sessiyalar',cp:'Bağlanan ödənişli sessiyalar',tickets:'Tiketlər',count:'Say',copy:'Kopyala',copied:'Kopyalandı!',update:'Yenilə',updated:'Yeniləndi!',placeholder:'Mətn burada görünəcək…'}
};
const L=(k)=>((t[window.__lang]||t.ru)[k]);
function applyLang(){
  document.getElementById('bHead').textContent=L('babek');
  document.getElementById('lHead').textContent=L('bail');
  ['lb1','ll1'].forEach(id=>document.getElementById(id).textContent=L('cars'));
  ['lb2','ll2'].forEach(id=>document.getElementById(id).textContent=L('park'));
  ['lb3','ll3'].forEach(id=>document.getElementById(id).textContent=L('manual'));
  ['lb4','ll4'].forEach(id=>document.getElementById(id).textContent=L('nf'));
  ['lb5','ll5'].forEach(id=>document.getElementById(id).textContent=L('cf'));
  ['lb6','ll6'].forEach(id=>document.getElementById(id).textContent=L('cp'));
  document.getElementById('ticketsH').textContent=L('tickets');
  document.getElementById('ticketsL').textContent=L('count');
  document.getElementById('copy').setAttribute('title', L('copy'));
  document.getElementById('copy').setAttribute('aria-label', L('copy'));
  document.getElementById('updateNow').setAttribute('title', L('update'));
  document.getElementById('updateNow').setAttribute('aria-label', L('update'));
  document.getElementById('toast').textContent=L('copied');
  document.getElementById('out').setAttribute('placeholder', L('placeholder'));
}
applyLang();

function pad(n){return n.toString().padStart(2,'0')}
function fmt(d){return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function atTime(date,h,m){return new Date(date.getFullYear(),date.getMonth(),date.getDate(),h,m,0,0)}
function computeShift(){
  const now=new Date();
  const seven=atTime(now,7,0), nineteen=atTime(now,19,0);
  let start,end;
  if(now>=nineteen){
    end=nineteen;
    start=atTime(now,7,0);
  } else if(now>=seven){
    end=seven;
    const y=new Date(now); y.setDate(now.getDate()-1);
    start=atTime(y,19,0);
  } else {
    const y=new Date(now); y.setDate(now.getDate()-1);
    end=atTime(y,19,0);
    start=atTime(y,7,0);
  }
  document.getElementById('startDT').value=fmt(start);
  document.getElementById('endDT').value=fmt(end);
}

function val(id){
  const el=document.getElementById(id);
  const v=el.value;
  return (v===''||isNaN(+v)) ? 0 : +v;
}

function showToast(key){
  const toast=document.getElementById('toast');
  toast.textContent=L(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function buildText(){
  const s=document.getElementById('startDT').value.trim();
  const e=document.getElementById('endDT').value.trim();
  const bb={p:val('bb_period'),on:val('bb_onparking'),m:val('bb_manual'),nf:val('bb_notfound'),cf:val('bb_close_free'),cp:val('bb_close_paid')};
  const bl={p:val('bl_period'),on:val('bl_onparking'),m:val('bl_manual'),nf:val('bl_notfound'),cf:val('bl_close_free'),cp:val('bl_close_paid')};
  const tickets=val('tickets');
  const lines=[
    s,
    e,
    '',
    'Браво Бабек',
    `Машин за период: ${bb.p}`,
    `Не найдены: ${bb.nf}`,
    `На парковке: ${bb.on}`,
    `Ручных открытий: ${bb.m}`,
    `Закрытие бесплатных сессий: ${bb.cf}`,
    `Закрытие платных сессий: ${bb.cp}`,
    '',
    'Браво Баилова',
    `Машин за период: ${bl.p}`,
    `Не найдены: ${bl.nf}`,
    `На парковке: ${bl.on}`,
    `Ручных открытий: ${bl.m}`,
    `Закрытие бесплатных сессий: ${bl.cf}`,
    `Закрытие платных сессий: ${bl.cp}`,
    '',
    '',
    `Тикеты: ${tickets}`
  ];
  document.getElementById('out').value=lines.join('\n');
}

const INPUT_IDS=['bb_period','bb_onparking','bb_manual','bb_notfound','bb_close_free','bb_close_paid','bl_period','bl_onparking','bl_manual','bl_notfound','bl_close_free','bl_close_paid','tickets'];
INPUT_IDS.forEach(id=>document.getElementById(id).addEventListener('input',buildText));

computeShift();
buildText();
window.addEventListener('focus', ()=>{ computeShift(); buildText(); });
setInterval(()=>{ computeShift(); buildText(); }, 60000);

document.getElementById('updateNow').addEventListener('click', ()=>{
  computeShift();
  buildText();
  showToast('updated');
});

document.getElementById('copy').addEventListener('click', async ()=>{
  const text = document.getElementById('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    const ta=document.getElementById('out');
    ta.focus();
    ta.select();
    document.execCommand('copy');
  }
  showToast('copied');
});
</script>
<script src="pwa-update.js"></script>
</body>
</html>
