<style>

.support2-select{width:100%;padding:15px 48px 15px 18px;border-radius:18px;border:2px solid #3f78ff;background:linear-gradient(180deg,#14203a 0%,#0f1729 100%);color:var(--text);font-size:18px;font-weight:800;appearance:none;-webkit-appearance:none;background-image:linear-gradient(180deg,#14203a 0%,#0f1729 100%),linear-gradient(45deg,transparent 50%,#dbe7ff 50%),linear-gradient(135deg,#dbe7ff 50%,transparent 50%);background-position:left top,calc(100% - 24px) calc(50% - 3px),calc(100% - 18px) calc(50% - 3px);background-size:100% 100%,7px 7px,7px 7px;background-repeat:no-repeat;box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.04)}

@media (max-width:520px){.support2-header img{width:min(160px, calc(100vw - 176px))}.support2-select{font-size:17px;padding:14px 44px 14px 16px}.support2-count{font-size:38px}.support2-btn.plus{min-height:54px;font-size:20px}.support2-btn.minus{width:76px;min-width:76px;min-height:48px;font-size:17px}.support2-out{min-height:100px}}

<body>
<div class="container support2-page">
  <div class="support2-header">
    <a class="home" href="index.html?v=20260414pro8" aria-label="Р вҖңР В»Р В°Р РҶР Р…Р В°РЎРҸ">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
  </div>

  <input id="startDT" type="hidden" />
  <input id="endDT" type="hidden" />

  <div class="support2-pickerrow">
    <div class="support2-picker">
      <div class="support2-selectwrap">
        <select id="objectSelect" class="support2-select" aria-label="Р СӣР ВұРЎРүР ВөР С”РЎвҖҡ"></select>
      </div>
    </div>
    <div class="support2-actions">
      <button class="support2-headbtn" id="resetAll" aria-label="Р РҺР ВұРЎРӮР С•РЎРғР С‘РЎвҖҡРЎРҠ" title="Р РҺР ВұРЎРӮР С•РЎРғР С‘РЎвҖҡРЎРҠ"><svg viewBox="0 0 24 24"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v11zm3.5-8h1.5v7h-1.5v-7zm5 0H16v7h-1.5v-7z"/><path d="M9 4V3h6v1h5v2H4V4h5z"/></svg></button>
      <button class="support2-headbtn" id="copy" aria-label="Р СҷР С•Р С—Р С‘РЎРӮР С•Р РҶР В°РЎвҖҡРЎРҠ" title="Р СҷР С•Р С—Р С‘РЎРӮР С•Р РҶР В°РЎвҖҡРЎРҠ"><svg viewBox="0 0 24 24"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"/><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"/></svg></button>
    </div>
  </div>

  <div class="support2-stack">
    <div class="support2-counter">
      <div class="support2-counterhead">
        <div class="support2-label" id="freeLabel">Р вҖҳР ВөРЎРғР С—Р В»Р В°РЎвҖҡР Р…РЎвҖ№Р Вө</div>
        <div class="support2-count" id="freeCount">0</div>
      </div>
      <div class="support2-buttons">
        <button class="support2-btn plus" id="freeInc">+1</button>
        <button class="support2-btn minus" id="freeDec">РІвӮ¬вҖҷ1</button>
      </div>
    </div>

    <div class="support2-counter">
      <div class="support2-counterhead">
        <div class="support2-label" id="paidLabel">Р СҹР В»Р В°РЎвҖҡР Р…РЎвҖ№Р Вө</div>
        <div class="support2-count" id="paidCount">0</div>
      </div>
      <div class="support2-buttons">
        <button class="support2-btn plus" id="paidInc">+1</button>
        <button class="support2-btn minus" id="paidDec">РІвӮ¬вҖҷ1</button>
      </div>
    </div>
  </div>

  <div class="support2-outcard">
    <textarea class="support2-out" id="out" placeholder="Р СһР ВөР С”РЎРғРЎвҖҡ Р С—Р С•РЎРҸР РҶР С‘РЎвҖҡРЎРғРЎРҸ Р В·Р Т‘Р ВөРЎРғРЎРҠРІРӮВҰ"></textarea>
  </div>
</div>
<div class="toast" id="toast">Р РҺР С”Р С•Р С—Р С‘РЎРӮР С•Р РҶР В°Р Р…Р С•!</div>

<script>
const LANG = {
  ru:{copy:'Р СҷР С•Р С—Р С‘РЎРӮР С•Р РҶР В°РЎвҖҡРЎРҠ',copied:'Р РҺР С”Р С•Р С—Р С‘РЎРӮР С•Р РҶР В°Р Р…Р С•!',reset:'Р РҺР ВұРЎРӮР С•РЎРғР С‘РЎвҖҡРЎРҠ РЎРғРЎвҖЎРЎвҖҳРЎвҖҡРЎвҖЎР С‘Р С”Р С‘',resetAsk:'Р РҺР ВұРЎРӮР С•РЎРғР С‘РЎвҖҡРЎРҠ Р РҶРЎРғР Вө РЎРғРЎвҖЎРЎвҖҳРЎвҖҡРЎвҖЎР С‘Р С”Р С‘ Support II?',resetDone:'Р РҺРЎвҖЎРЎвҖҳРЎвҖҡРЎвҖЎР С‘Р С”Р С‘ РЎРғР ВұРЎРӮР С•РЎвӮ¬Р ВөР Р…РЎвҖ№!',free:'Р вҖҳР ВөРЎРғР С—Р В»Р В°РЎвҖҡР Р…РЎвҖ№Р Вө',paid:'Р СҹР В»Р В°РЎвҖҡР Р…РЎвҖ№Р Вө',placeholder:'Р СһР ВөР С”РЎРғРЎвҖҡ Р С—Р С•РЎРҸР РҶР С‘РЎвҖҡРЎРғРЎРҸ Р В·Р Т‘Р ВөРЎРғРЎРҠРІРӮВҰ',object:'Р СӣР ВұРЎРүР ВөР С”РЎвҖҡ'},
  az:{copy:'Kopyala',copied:'KopyalandР”Вұ!',reset:'SayР”СҹaclarР”Вұ sР”ВұfР”Вұrla',resetAsk:'Support II sayР”СҹaclarР”ВұnР”Вұn hamР”ВұsР”Вұ sР”ВұfР”ВұrlansР”Вұn?',resetDone:'SayР”Сҹaclar sР”ВұfР”ВұrlandР”Вұ!',free:'Pulsuz',paid:'Р“вҖ“dРҷв„ўniР•Сҹli',placeholder:'MРҷв„ўtn burada gР“В¶rР“СҳnРҷв„ўcРҷв„ўkРІРӮВҰ',object:'Obyekt'}
};
const T = (k) => ((LANG[window.__lang] || LANG.ru)[k] || (LANG.ru[k] || k));
const $ = (id) => document.getElementById(id);
const OBJECTS = [
  {id:'east_park', name:'East Park', reportRu:'Р ВҳРЎРғРЎвҖҡ Р СҹР В°РЎРӮР С”'},
  {id:'konqres', name:'Konqres', reportRu:'Р СҷР С•Р Р…Р С–РЎРӮР ВөРЎРғ'},
  {id:'jale_plaza', name:'JalРҷв„ў Plaza', reportRu:'Р вҖқР В¶Р В°Р В»РЎРҸ Р СҹР В»Р В°Р В·Р В°'},
  {id:'bakixanov_mall', name:'BakР”Вұxanov mall', reportRu:'Р вҖҳР В°Р С”Р С‘РЎвҖҰР В°Р Р…Р С•Р РҶ Р СҳР С•Р В»Р В»'},
  {id:'parkspot', name:'Parkspot', reportRu:'Р СҹР В°РЎРӮР С”РЎРғР С—Р С•РЎвҖҡ'},
  {id:'univerium', name:'Univerium', reportRu:'Р РҲР Р…Р С‘Р РҶР ВөРЎРӮР С‘РЎС“Р Сҳ'},
  {id:'liv_bona_dea', name:'Liv Bona Dea', reportRu:'Р вҖәР С‘Р РҶ Р вҖҳР С•Р Р…Р В° Р вҖқР ВөР В°'}
];
const CURRENT_OBJECT_KEY = 'support2_current_object';

function countKey(type, objectId){ return `support2_${objectId}_${type}`; }
function getCount(type, objectId){ return Number(localStorage.getItem(countKey(type, objectId)) || '0'); }
function setCount(type, objectId, value){ localStorage.setItem(countKey(type, objectId), String(Math.max(0, value))); }
function getCurrentObjectId(){
  const saved = localStorage.getItem(CURRENT_OBJECT_KEY);
  return saved && OBJECTS.some(o => o.id === saved) ? saved : OBJECTS[0].id;
}
function setCurrentObjectId(objectId){ localStorage.setItem(CURRENT_OBJECT_KEY, objectId); }
function getCurrentObject(){ return OBJECTS.find(o => o.id === getCurrentObjectId()) || OBJECTS[0]; }
function resetAllCounts(){
  for (const object of OBJECTS){
    localStorage.removeItem(countKey('free', object.id));
    localStorage.removeItem(countKey('paid', object.id));
  }
}
function migrateLegacyCounts(){
  const legacy = [['1','east_park'],['2','konqres'],['3','jale_plaza'],['4','bakixanov_mall'],['5','parkspot'],['6','univerium'],['7','liv_bona_dea']];
  for (const [oldIndex, objectId] of legacy){
    for (const type of ['free','paid']){
      const oldKey = `support2_${type}_${oldIndex}`;
      const newKey = countKey(type, objectId);
      const oldVal = localStorage.getItem(oldKey);
      const newVal = localStorage.getItem(newKey);
      if (oldVal !== null && newVal === null) localStorage.setItem(newKey, oldVal);
      localStorage.removeItem(oldKey);
    }
  }
}
function pad(n){ return n.toString().padStart(2,'0'); }
function fmt(d){ return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function atTime(date,h,m){ return new Date(date.getFullYear(), date.getMonth(), date.getDate(), h, m, 0, 0); }
function computeShift(){
  const now = new Date();
  $('startDT').value = fmt(atTime(now, 13, 0));
  $('endDT').value = fmt(atTime(now, 21, 0));
}
function showToast(key){
  const toast = $('toast');
  toast.textContent = T(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 1500);
}
function renderObjectSelect(){
  const select = $('objectSelect');
  select.innerHTML = OBJECTS.map(object => `<option value="${object.id}">${object.name}</option>`).join('');
  select.value = getCurrentObjectId();
}
function renderCurrentObject(){
  const current = getCurrentObject();
  $('objectSelect').value = current.id;
  $('freeCount').textContent = getCount('free', current.id);
  $('paidCount').textContent = getCount('paid', current.id);
}
function buildText(){
  const lines = [$('startDT').value.trim(), $('endDT').value.trim(), ''];
  let hasEntries = false;
  for (const object of OBJECTS){
    const freeValue = getCount('free', object.id);
    const paidValue = getCount('paid', object.id);
    if (freeValue === 0 && paidValue === 0) continue;
    const parts = [];
    if (freeValue > 0) parts.push(`Р вҖҳР ВөРЎРғР С—Р В»Р В°РЎвҖҡР Р…РЎвҖ№Р Вө ${freeValue}`);
    if (paidValue > 0) parts.push(`Р СҹР В»Р В°РЎвҖҡР Р…РЎвҖ№Р Вө ${paidValue}`);
    lines.push(`*${object.reportRu}*`);
    lines.push(parts.join(' | '));
    hasEntries = true;
  }
  if (!hasEntries) lines.push('');
  $('out').value = lines.join('\n');
}
function applyLang(){
  $('freeLabel').textContent = T('free');
  $('paidLabel').textContent = T('paid');
  $('copy').setAttribute('title', T('copy'));
  $('copy').setAttribute('aria-label', T('copy'));
  $('resetAll').setAttribute('title', T('reset'));
  $('resetAll').setAttribute('aria-label', T('reset'));
  $('out').setAttribute('placeholder', T('placeholder'));
}
function changeCount(type, delta){
  const current = getCurrentObject();
  setCount(type, current.id, getCount(type, current.id) + delta);
  renderCurrentObject();
  buildText();
}

$('objectSelect').addEventListener('change', (e) => {
  setCurrentObjectId(e.target.value);
  renderCurrentObject();
});
$('freeInc').addEventListener('click', () => changeCount('free', 1));
$('freeDec').addEventListener('click', () => changeCount('free', -1));
$('paidInc').addEventListener('click', () => changeCount('paid', 1));
$('paidDec').addEventListener('click', () => changeCount('paid', -1));
$('resetAll').addEventListener('click', () => {
  if (!confirm(T('resetAsk'))) return;
  resetAllCounts();
  renderCurrentObject();
  buildText();
  showToast('resetDone');
});
$('copy').addEventListener('click', async () => {
  const text = $('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    $('out').focus();
    $('out').select();
    document.execCommand('copy');
  }
  showToast('copied');
});

migrateLegacyCounts();
renderObjectSelect();
applyLang();
computeShift();
renderCurrentObject();
buildText();
window.addEventListener('focus', () => { computeShift(); buildText(); renderCurrentObject(); });
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible'){ computeShift(); buildText(); renderCurrentObject(); } });
window.addEventListener('pageshow', () => { computeShift(); buildText(); renderCurrentObject(); });
setInterval(() => { computeShift(); buildText(); }, 30000);
</script>
<script src="pwa-update.js?v=20260414pro8"></script>
