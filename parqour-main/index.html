<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour</title>
<link rel="stylesheet" href="style.css?v=7">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container">
  <div class="header">
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
      <button id="btnAZ" onclick="__setLang('az')">AZ</button>
    </div>
  </div>

  <div class="card">
    <a class="tile" href="counter.html" id="tileCounter">➕ Счётчик</a>
    <a class="tile" href="report.html" id="tileReport">🧾 Бабек отчёт</a>
    <a class="tile" href="support2.html" id="tileSupport2">🧩 Support 2</a>
    <a class="tile" href="autofetch.html" id="tileAuto">⚡ Короглу авто отчёт</a>
  </div>

  <div class="footer" id="footnote"></div>
</div>

<script>
const t={
  ru:{counter:'➕ Счётчик', report:'🧾 Бабек отчёт', support2:'🧩 Support 2', auto:'⚡ Короглу авто отчёт', note:'Все данные сохраняются локально в вашем браузере (сохраняются после закрытия).'},
  az:{counter:'➕ Sayğac', report:'🧾 Babək hesabat', support2:'🧩 Support 2', auto:'⚡ Koroğlu avtomatik hesabat', note:'Bütün məlumatlar brauzerinizdə lokal saxlanılır və bağladıqdan sonra da qalır.'}
};
function apply(){
  const l=(window.__lang==='az')?'az':'ru';
  document.getElementById('tileCounter').textContent=t[l].counter;
  document.getElementById('tileReport').textContent=t[l].report;
  document.getElementById('tileSupport2').textContent=t[l].support2;
  document.getElementById('tileAuto').textContent=t[l].auto;
  document.getElementById('footnote').textContent=t[l].note;
  document.getElementById(l==='az'?'btnAZ':'btnRU').classList.add('active');
}
apply();
</script>
<script src="pwa-update.js"></script>
</body>
</html>
