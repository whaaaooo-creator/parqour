    notFoundReasonId:1,

    carStateOrderColumn:2,
    carStateFilterDefaults:{
      plateNumber:'',
      amount:'',

      outGateId:'',

    },
    journalRefererPath:'/journal/list',
    eventsRefererPath:'/events/list?lang=ru'

function pad(n){ return String(n).padStart(2, '0'); }

function dtLocal(date){
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function getNearestShiftRange(now = new Date()){
  const points = [];
  for(let d = -1; d <= 1; d++){
    const day = new Date(now.getFullYear(), now.getMonth(), now.getDate() + d, 0, 0, 0, 0);
    points.push(new Date(day.getFullYear(), day.getMonth(), day.getDate(), 7, 0, 0, 0));
    points.push(new Date(day.getFullYear(), day.getMonth(), day.getDate(), 19, 0, 0, 0));
  }
  let nearest = points[0];
  let best = Math.abs(now - nearest);
  for(const point of points){
    const diff = Math.abs(now - point);
    if(diff < best){
      best = diff;
      nearest = point;
    }
  }
  let start;
  let end;
  if(nearest.getHours() === 19){
    start = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 7, 0, 0, 0);
    end = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 19, 0, 0, 0);
  }else{
    end = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 7, 0, 0, 0);
    start = new Date(end.getTime() - 12 * 60 * 60 * 1000);
  }
  return {start, end};
}

function applyAutoShift(force = false){
  const range = getNearestShiftRange();
  const nextStart = dtLocal(range.start);
  const nextEnd = dtLocal(range.end);
  const changed = $('startDT').value !== nextStart || $('endDT').value !== nextEnd;
  if(force || changed){
    $('startDT').value = nextStart;
    $('endDT').value = nextEnd;
    saveRange();
    return true;
  }
  return false;
}

function loadDefaults(){
  applyAutoShift(true);
}

function saveRange(){
  localStorage.setItem(LSTR_KEY, JSON.stringify({start:$('startDT').value, end:$('endDT').value}));
}

function applyLang(){
  $('lblStart').textContent = tr('start');
  $('lblEnd').textContent = tr('end');
  $('runBtn').textContent = tr('run');
  $('out').placeholder = tr('placeholder');
  $('toast').textContent = tr('copied');
}

function setStatus(text){
  $('status').textContent = text || '';
}

function showToast(text){
  const el = $('toast');
  el.textContent = text || tr('copied');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => el.classList.remove('show'), 1500);
}

async function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  ta.style.pointerEvents = 'none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function withYear2020(startValue){
  if(!startValue) return startValue;
  return startValue.replace(/^\d{4}/, '2020');
}

function makeCarStatePayload(cfg, dateFromString, dateToString, inParking){
  return {
    draw: 1,
    columns: cfg.carStateColumns,
    order:[{column:cfg.carStateOrderColumn, dir:'desc'}],
    start:0,
    length:10,
    search:{value:'', regex:false},
    customFilters:{
      dateFromString,
      dateToString,
      ...cfg.carStateFilterDefaults,
      inParking:!!inParking
    }
  };
}

function makeEventsPayload(){
  return {
    draw: 1,
    columns: EVENT_COLUMNS,
    order:[{column:0, dir:'desc'}],
    start:0,
    length:10,
    search:{value:'', regex:false}
  };
}

async function postJson(base, url, payload, refererPath){
  const headers = {
    'accept':'application/json, text/javascript, */*; q=0.01',
    'content-type':'application/json',
    'x-requested-with':'XMLHttpRequest'
  };
  const extra = {};
  try{
    extra.referrer = base + refererPath;
  }catch(_){}
  let res;
  try{
    res = await fetch(url, {
      method:'POST',
      credentials:'include',
      mode:'cors',
      headers,
      body: JSON.stringify(payload),
      ...extra
    });
  }catch(err){
    const e = new Error(tr('cors'));
    e.cause = err;
    throw e;
  }
  if(!res.ok){
    throw new Error(`HTTP ${res.status}`);
  }
  return res.json();
}

function extractCount(obj){
  if(obj && typeof obj.recordsFiltered === 'number') return obj.recordsFiltered;
  if(obj && typeof obj.recordsTotal === 'number') return obj.recordsTotal;
  if(obj && Array.isArray(obj.data)) return obj.data.length;
  return 0;
}

async function fetchObjectStats(cfg, start, end){
  const parkingStart = withYear2020(start);
  const normal = await postJson(
    cfg.base,
    `${cfg.base}/rest/carstate`,
    makeCarStatePayload(cfg, start, end, false),
    cfg.journalRefererPath
  );
  const inside = await postJson(
    cfg.base,
    `${cfg.base}/rest/carstate`,
    makeCarStatePayload(cfg, parkingStart, end, true),
    cfg.journalRefererPath
  );
  const manual = await postJson(
    cfg.base,
    `${cfg.base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=`,
    makeEventsPayload(),
    cfg.eventsRefererPath
  );
  const notFound = await postJson(
    cfg.base,
    `${cfg.base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=${cfg.notFoundReasonId}`,
    makeEventsPayload(),
    cfg.eventsRefererPath
  );
  return {
    period: extractCount(normal),
    notFound: extractCount(notFound),
    inParking: extractCount(inside),
    manualOpen: extractCount(manual)
  };
}

async function fetchObjectStatsSafe(cfg, start, end){
  try{
    const stats = await fetchObjectStats(cfg, start, end);
    return {ok:true, cfg, stats};
  }catch(error){
    return {ok:false, cfg, error};
  }
}

function formatRuBlock(cfg, stats){
  return [
    cfg.title,
    `\u041c\u0430\u0448\u0438\u043d \u0437\u0430 \u043f\u0435\u0440\u0438\u043e\u0434:${stats.period}`,
    `\u041d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u044b:${stats.notFound}`,
    `${cfg.parkingLine}:${stats.inParking}`,
    `\u0420\u0443\u0447\u043d\u044b\u0445 \u043e\u0442\u043a\u0440\u044b\u0442\u0438\u0439:${stats.manualOpen}`,
    cfg.freeLine,
    cfg.paidLine
  ].join('\n');
}

function formatRuDate(value){
  const [d, tValue] = value.split('T');
  const [y, m, day] = d.split('-');
  return `${day}.${m}.${y} ${tValue}`;
}

function formatDiagnostics(start, end, results){
  const lines = [
    formatRuDate(start),
    formatRuDate(end),
    '',
    tr('diag')
  ];
  for(const result of results){
    if(result.ok){
      lines.push(`${result.cfg.title}: ${tr('ok')}`);
    }else{
      const msg = result.error && result.error.message ? result.error.message : tr('failed');
      lines.push(`${result.cfg.title}: ${msg}`);
    }
  }
  lines.push('');
  lines.push(tr('hint'));
  return lines.join('\n');
}

function formatRuReport(start, end, results){
  return [
    formatRuDate(start),
    formatRuDate(end),
    '',
    formatRuBlock(results[0].cfg, results[0].stats),
    '',
    formatRuBlock(results[1].cfg, results[1].stats),
    '',
    '',
    '\u0422\u0438\u043a\u0435\u0442\u044b: 0'
  ].join('\n');
}

async function runFetch(){
  const start = $('startDT').value;
  const end = $('endDT').value;
  if(!start || !end){
    setStatus('');
    return;
  }
  saveRange();
  setStatus(tr('running'));
  $('runBtn').disabled = true;
  try{
    const results = [];
    for(const cfg of OBJECTS){
      results.push(await fetchObjectStatsSafe(cfg, start, end));
    }
    const failed = results.filter(result => !result.ok);
    if(failed.length){
      $('out').value = formatDiagnostics(start, end, results);
      setStatus(tr('partial'));
      return;
    }
    const text = formatRuReport(start, end, results);
    $('out').value = text;
    await copyText(text);
    setStatus(tr('ready'));
    showToast(tr('copied'));
  }catch(err){
    console.error(err);
    const msg = err && err.message ? err.message : tr('failed');
    setStatus(msg);
    $('out').value = `ERROR\n\n${msg}`;
  }finally{
    $('runBtn').disabled = false;
  }
}

loadDefaults();
applyLang();
$('runBtn').addEventListener('click', runFetch);
$('startDT').addEventListener('change', saveRange);
$('endDT').addEventListener('change', saveRange);

const refreshShiftIfNeeded = () => {
  if(document.visibilityState === 'hidden') return;
  applyAutoShift(false);
};

window.addEventListener('focus', refreshShiftIfNeeded);
document.addEventListener('visibilitychange', refreshShiftIfNeeded);
window.addEventListener('pageshow', refreshShiftIfNeeded);
setInterval(refreshShiftIfNeeded, AUTO_TICK_MS);
</script>
