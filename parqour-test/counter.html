<script>
const t={
  ru:{free:'Р‘РµСЃРїР»Р°С‚РЅС‹Рµ',paid:'РџР»Р°С‚РЅС‹Рµ',save:'РЎРѕС…СЂР°РЅРёС‚СЊ Рё СЃР±СЂРѕСЃРёС‚СЊ',journal:'Р–СѓСЂРЅР°Р»',clear:'РћС‡РёСЃС‚РёС‚СЊ Р¶СѓСЂРЅР°Р»',time:'Р’СЂРµРјСЏ',name:'РРјСЏ',askName:'Р’РІРµРґРёС‚Рµ РёРјСЏ',clearAsk:'РћС‡РёСЃС‚РёС‚СЊ Р¶СѓСЂРЅР°Р»?'},
  az:{free:'Pulsuz',paid:'Г–dЙ™niЕџli',save:'Saxla vЙ™ sД±fД±rla',journal:'Jurnal',clear:'JurnalД± tЙ™mizlЙ™',time:'Vaxt',name:'Ad',askName:'AdД± yazД±n',clearAsk:'Jurnal tЙ™mizlЙ™nsin?'}
};
const L=(k)=>((t[window.__lang]||t.ru)[k]);
function applyLang(){
  document.getElementById('lblFree').textContent=L('free');
  document.getElementById('lblPaid').textContent=L('paid');
  document.getElementById('saveReset').textContent=L('save');
  document.getElementById('lblJournal').textContent = L('journal');
  const cj=document.getElementById('clearJournal');
  if(cj){ cj.setAttribute('title', L('clear')); cj.setAttribute('aria-label', L('clear')); }

  document.getElementById('thTime').textContent=L('time');
  document.getElementById('thName').textContent=L('name');
  document.getElementById('thFree').textContent=L('free');
  document.getElementById('thPaid').textContent=L('paid');}
applyLang();

const $=(id)=>document.getElementById(id);
const get=(k,def=0)=>{const r=localStorage.getItem(k); if(r==null) return def; try{return JSON.parse(r)}catch{return r}};
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function renderCounts(){ $('countFree').textContent=Number(get('countFree',0)); $('countPaid').textContent=Number(get('countPaid',0)); }
function inc(key,delta){ const next=Number(get(key,0))+delta; set(key,Math.max(0,next)); renderCounts(); }
function saveToJournal(name,freeVal,paidVal){ const j=get('journal',[]); const ts=new Date().toISOString(); j.push({ts,name:name||'',free:freeVal,paid:paidVal}); set('journal',j); renderJournal(); }
function renderJournal(){ const j=get('journal',[]); const tb=document.querySelector('#journalTable tbody'); tb.innerHTML=''; const rows=[...j].map((e,i)=>({...e,idx:i+1})).reverse(); rows.forEach((e,i)=>{ const tr=document.createElement('tr'); const nm=(e.name||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m)); tr.innerHTML=`<td>${rows.length-i}</td><td>${new Date(e.ts).toLocaleString()}</td><td>${nm||'вЂ”'}</td><td>${e.free}</td><td>${e.paid}</td>`; tb.appendChild(tr); }); }
$('incFree').onclick=()=>inc('countFree',+1); $('decFree').onclick=()=>inc('countFree',-1); $('incPaid').onclick=()=>inc('countPaid',+1); $('decPaid').onclick=()=>inc('countPaid',-1);
$('saveReset').onclick=()=>{ const name=prompt(L('askName'),''); if(name===null) return; const trimmed=(name||'').trim(); if(!trimmed) return; const f=Number(get('countFree',0)); const p=Number(get('countPaid',0)); saveToJournal(trimmed,f,p); set('countFree',0); set('countPaid',0); renderCounts(); };
$('clearJournal').onclick=()=>{ if(confirm(L('clearAsk'))){ set('journal',[]); renderJournal(); } };
if(get('countFree')==null) set('countFree',0); if(get('countPaid')==null) set('countPaid',0); if(get('journal')==null) set('journal',[]);
renderCounts(); renderJournal();
</script>
