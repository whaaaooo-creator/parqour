<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour</title>
<link rel="stylesheet" href="style.css?v=12">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container homecontainer">
  <div class="header homeheader">
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
      <button id="btnAZ" onclick="__setLang('az')">AZ</button>
    </div>
  </div>

  <div class="homegrid modernhome">
    <a class="tile homecard" href="counter.html" id="tileCounter">
      <span class="tileiconchip" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2.5"></rect><line x1="8" y1="7" x2="16" y2="7"></line><circle cx="8.5" cy="11"></circle><circle cx="12" cy="11"></circle><circle cx="15.5" cy="11"></circle><circle cx="8.5" cy="14.5"></circle><circle cx="12" cy="14.5"></circle><circle cx="15.5" cy="14.5"></circle><circle cx="8.5" cy="18"></circle><circle cx="12" cy="18"></circle><circle cx="15.5" cy="18"></circle></svg>
      </span>
      <span class="tilecontent">
        <span class="tilelabel">Счётчик сессий</span>
      </span>
      <span class="tilechev" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M9 6l6 6l-6 6"></path></svg>
      </span>
    </a>

    <a class="tile homecard" href="report.html" id="tileReport">
      <span class="tileiconchip" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"></path><path d="M14 3v4h4"></path><line x1="9" y1="11" x2="15" y2="11"></line><line x1="9" y1="14.5" x2="15" y2="14.5"></line><line x1="9" y1="18" x2="15" y2="18"></line></svg>
      </span>
      <span class="tilecontent">
        <span class="tilelabel">Бабек отчёт</span>
      </span>
      <span class="tilechev" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M9 6l6 6l-6 6"></path></svg>
      </span>
    </a>

    <a class="tile homecard" href="autofetch.html" id="tileAuto">
      <span class="tileiconchip" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"></path><path d="M14 3v4h4"></path><line x1="9" y1="11" x2="15" y2="11"></line><line x1="9" y1="14.5" x2="15" y2="14.5"></line><path d="M16.5 16.5v3"></path><path d="M15 18l1.5 1.5L18 18"></path></svg>
      </span>
      <span class="tilecontent">
        <span class="tilelabel">Короглу отчёт</span>
      </span>
      <span class="tilechev" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M9 6l6 6l-6 6"></path></svg>
      </span>
    </a>

    <a class="tile homecard" href="support2.html" id="tileSupport2">
      <span class="tileiconchip" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1.5"></rect><rect x="14" y="4" width="6" height="6" rx="1.5"></rect><rect x="4" y="14" width="6" height="6" rx="1.5"></rect><rect x="14" y="14" width="6" height="6" rx="1.5"></rect></svg>
      </span>
      <span class="tilecontent">
        <span class="tilelabel">Support 2</span>
      </span>
      <span class="tilechev" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M9 6l6 6l-6 6"></path></svg>
      </span>
    </a>
  </div>

  <div class="footer homefooter" id="footnote"></div>
</div>

<script>
const t={
  ru:{counter:'Счётчик сессий', report:'Бабек отчёт', support2:'Support 2', auto:'Короглу отчёт', note:'Все данные сохраняются локально в вашем браузере.'},
  az:{counter:'Sessiya sayan', report:'Babək hesabat', support2:'Support 2', auto:'Koroğlu hesabat', note:'Bütün məlumatlar brauzerinizdə lokal saxlanılır.'}
};
function apply(){
  const l=(window.__lang==='az')?'az':'ru';
  document.querySelector('#tileCounter .tilelabel').textContent=t[l].counter;
  document.querySelector('#tileReport .tilelabel').textContent=t[l].report;
  document.querySelector('#tileSupport2 .tilelabel').textContent=t[l].support2;
  document.querySelector('#tileAuto .tilelabel').textContent=t[l].auto;
  document.getElementById('footnote').textContent=t[l].note;
  document.getElementById('btnRU').classList.toggle('active', l==='ru');
  document.getElementById('btnAZ').classList.toggle('active', l==='az');
}
apply();
</script>
<script src="pwa-update.js"></script>
</body>
</html>
