<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour — Support 2</title>
<link rel="stylesheet" href="style.css?v=20260413fix4">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
<style>
.support2-page{padding-top:12px}
.support2-header{position:relative;display:flex;justify-content:center;align-items:center;margin-bottom:18px;padding-top:6px}
.support2-header img{width:min(170px, calc(100vw - 184px));height:auto;display:block}
.support2-actions{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;gap:8px;align-items:center}
.support2-headbtn{display:inline-flex;align-items:center;justify-content:center;padding:8px;border:1px solid #313a57;border-radius:12px;background:linear-gradient(180deg,#181d2d 0%,#141926 100%);box-shadow:0 8px 18px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.03)}
.support2-headbtn svg{width:18px;height:18px;display:block;fill:#e0e4ee}
.support2-picker{margin-top:4px}
.support2-select{position:relative;width:100%;padding:17px 52px 17px 20px;border-radius:20px;border:2px solid #3f78ff;background:linear-gradient(180deg,#16223a 0%,#0f1729 100%);color:#f6f8fc;font-size:19px;font-weight:800;letter-spacing:-.01em;appearance:none;-webkit-appearance:none;background-image:linear-gradient(180deg,#16223a 0%,#0f1729 100%),linear-gradient(45deg,transparent 50%,#cfe0ff 50%),linear-gradient(135deg,#cfe0ff 50%,transparent 50%);background-position:left top,calc(100% - 24px) calc(50% - 3px),calc(100% - 18px) calc(50% - 3px);background-size:100% 100%,7px 7px,7px 7px;background-repeat:no-repeat;box-shadow:0 0 0 1px rgba(88,132,255,.18),0 12px 24px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.04), inset 0 -10px 20px rgba(18,31,58,.28);text-shadow:0 1px 0 rgba(0,0,0,.35)}
.support2-select:focus{outline:none;border-color:#5e8cff;box-shadow:0 0 0 3px rgba(75,137,255,.20),0 12px 24px rgba(0,0,0,.18),0 0 0 1px rgba(88,132,255,.22) inset,inset 0 1px 0 rgba(255,255,255,.04), inset 0 -10px 20px rgba(18,31,58,.28)}
.support2-stack{display:flex;flex-direction:column;gap:12px;margin-top:14px}
.support2-counter{padding:16px 16px 14px;border-radius:24px;border:1px solid #2b3145;background:linear-gradient(180deg,#171c2d 0%,#111624 100%);box-shadow:0 14px 28px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.03)}
.support2-counterhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.support2-label{font-size:17px;font-weight:700;color:#eef2fb}
.support2-count{font-size:42px;line-height:1;font-weight:800;color:#fff}
.support2-buttons{display:flex;align-items:stretch;gap:10px}
.support2-btn{border:1px solid transparent;border-radius:18px;color:#fff;font-weight:800;letter-spacing:-.01em}
.support2-btn.plus{flex:1;min-height:62px;font-size:22px;background:linear-gradient(180deg,#18b591 0%,#0e7460 100%);border-color:#2bb596;box-shadow:0 8px 18px rgba(12,98,81,.20), inset 0 1px 0 rgba(255,255,255,.06)}
.support2-btn.minus{width:86px;min-width:86px;min-height:56px;font-size:18px;background:linear-gradient(180deg,#92384f 0%,#6a2336 100%);border-color:#b75c71;box-shadow:0 6px 14px rgba(94,31,49,.18), inset 0 1px 0 rgba(255,255,255,.05)}
.support2-outcard{margin-top:14px;padding:8px;border-radius:18px;border:1px solid #2b3145;background:linear-gradient(180deg,#151a2a 0%,#121726 100%)}
.support2-out{width:100%;min-height:118px;padding:12px 14px;border-radius:16px;border:1px solid #25304c;background:#0b0f1c;color:#edf1f8;font-size:15px;line-height:1.42;resize:vertical}
.support2-out::placeholder{color:#8791a9}
@media (max-width:520px){
  .support2-header img{width:min(164px, calc(100vw - 176px))}
  .support2-headbtn{padding:8px}
  .support2-select{font-size:18px;padding:15px 46px 15px 17px}
  .support2-counter{padding:14px 14px 13px;border-radius:22px}
  .support2-label{font-size:16px}
  .support2-count{font-size:40px}
  .support2-btn.plus{min-height:58px;font-size:21px}
  .support2-btn.minus{width:80px;min-width:80px;min-height:52px;font-size:17px}
  .support2-out{min-height:108px;font-size:14px;padding:11px 12px}
}
</style>
</head>
<body>
<div class="container support2-page">
  <div class="support2-header">
    <a class="home" href="index.html?v=20260413fix4" aria-label="Главная">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
    <div class="support2-actions">
      <button class="support2-headbtn" id="resetAll" aria-label="Сбросить" title="Сбросить"><svg viewBox="0 0 24 24"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v11zm3.5-8h1.5v7h-1.5v-7zm5 0H16v7h-1.5v-7z"/><path d="M9 4V3h6v1h5v2H4V4h5z"/></svg></button>
      <button class="support2-headbtn" id="copy" aria-label="Копировать" title="Копировать"><svg viewBox="0 0 24 24"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"/><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"/></svg></button>
    </div>
  </div>

  <input id="startDT" type="hidden" />
  <input id="endDT" type="hidden" />

  <div class="support2-picker">
    <div class="support2-selectwrap">
      <select id="objectSelect" class="support2-select" aria-label="Объект"></select>
    </div>
  </div>

  <div class="support2-stack">
    <div class="support2-counter">
      <div class="support2-counterhead">
        <div class="support2-label" id="freeLabel">Бесплатные</div>
        <div class="support2-count" id="freeCount">0</div>
      </div>
      <div class="support2-buttons">
        <button class="support2-btn plus" id="freeInc">+1</button>
        <button class="support2-btn minus" id="freeDec">−1</button>
      </div>
    </div>

    <div class="support2-counter">
      <div class="support2-counterhead">
        <div class="support2-label" id="paidLabel">Платные</div>
        <div class="support2-count" id="paidCount">0</div>
      </div>
      <div class="support2-buttons">
        <button class="support2-btn plus" id="paidInc">+1</button>
        <button class="support2-btn minus" id="paidDec">−1</button>
      </div>
    </div>
  </div>

  <div class="support2-outcard">
    <textarea class="support2-out" id="out" placeholder="Текст появится здесь…"></textarea>
  </div>
</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const LANG = {
  ru:{copy:'Копировать',copied:'Скопировано!',reset:'Сбросить счётчики',resetAsk:'Сбросить все счётчики Support II?',resetDone:'Счётчики сброшены!',free:'Бесплатные',paid:'Платные',placeholder:'Текст появится здесь…',object:'Объект'},
  az:{copy:'Kopyala',copied:'Kopyalandı!',reset:'Sayğacları sıfırla',resetAsk:'Support II sayğaclarının hamısı sıfırlansın?',resetDone:'Sayğaclar sıfırlandı!',free:'Pulsuz',paid:'Ödənişli',placeholder:'Mətn burada görünəcək…',object:'Obyekt'}
};
const T = (k) => ((LANG[window.__lang] || LANG.ru)[k] || (LANG.ru[k] || k));
const $ = (id) => document.getElementById(id);
const OBJECTS = [
  {id:'east_park', name:'East Park', reportRu:'Ист Парк'},
  {id:'konqres', name:'Konqres', reportRu:'Конгрес'},
  {id:'jale_plaza', name:'Jalə Plaza', reportRu:'Джаля Плаза'},
  {id:'bakixanov_mall', name:'Bakıxanov mall', reportRu:'Бакиханов молл'},
  {id:'parkspot', name:'Parkspot', reportRu:'Паркспот'},
  {id:'univerium', name:'Univerium', reportRu:'Универиум'},
  {id:'liv_bona_dea', name:'Liv Bona Dea', reportRu:'Лив Бона Деа'}
];
const CURRENT_OBJECT_KEY = 'support2_current_object';

function countKey(type, objectId){ return `support2_${objectId}_${type}`; }
function getCount(type, objectId){ return Number(localStorage.getItem(countKey(type, objectId)) || '0'); }
function setCount(type, objectId, value){ localStorage.setItem(countKey(type, objectId), String(Math.max(0, value))); }
function getCurrentObjectId(){
  const saved = localStorage.getItem(CURRENT_OBJECT_KEY);
  return saved && OBJECTS.some(o => o.id === saved) ? saved : OBJECTS[0].id;
}
function setCurrentObjectId(objectId){ localStorage.setItem(CURRENT_OBJECT_KEY, objectId); }
function getCurrentObject(){ return OBJECTS.find(o => o.id === getCurrentObjectId()) || OBJECTS[0]; }
function resetAllCounts(){
  for (const object of OBJECTS){
    localStorage.removeItem(countKey('free', object.id));
    localStorage.removeItem(countKey('paid', object.id));
  }
}
function migrateLegacyCounts(){
  const legacy = [['1','east_park'],['2','konqres'],['3','jale_plaza'],['4','bakixanov_mall'],['5','parkspot'],['6','univerium'],['7','liv_bona_dea']];
  for (const [oldIndex, objectId] of legacy){
    for (const type of ['free','paid']){
      const oldKey = `support2_${type}_${oldIndex}`;
      const newKey = countKey(type, objectId);
      const oldVal = localStorage.getItem(oldKey);
      const newVal = localStorage.getItem(newKey);
      if (oldVal !== null && newVal === null) localStorage.setItem(newKey, oldVal);
      localStorage.removeItem(oldKey);
    }
  }
}
function pad(n){ return n.toString().padStart(2,'0'); }
function fmt(d){ return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function atTime(date,h,m){ return new Date(date.getFullYear(), date.getMonth(), date.getDate(), h, m, 0, 0); }
function computeShift(){
  const now = new Date();
  $('startDT').value = fmt(atTime(now, 13, 0));
  $('endDT').value = fmt(atTime(now, 21, 0));
}
function showToast(key){
  const toast = $('toast');
  toast.textContent = T(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 1500);
}
function renderObjectSelect(){
  const select = $('objectSelect');
  select.innerHTML = OBJECTS.map(object => `<option value="${object.id}">${object.name}</option>`).join('');
  select.value = getCurrentObjectId();
}
function renderCurrentObject(){
  const current = getCurrentObject();
  $('objectSelect').value = current.id;
  $('freeCount').textContent = getCount('free', current.id);
  $('paidCount').textContent = getCount('paid', current.id);
}
function buildText(){
  const lines = [$('startDT').value.trim(), $('endDT').value.trim(), ''];
  let hasEntries = false;
  for (const object of OBJECTS){
    const freeValue = getCount('free', object.id);
    const paidValue = getCount('paid', object.id);
    if (freeValue === 0 && paidValue === 0) continue;
    const parts = [];
    if (freeValue > 0) parts.push(`Бесплатные ${freeValue}`);
    if (paidValue > 0) parts.push(`Платные ${paidValue}`);
    lines.push(`*${object.reportRu}*`);
    lines.push(parts.join(' | '));
    hasEntries = true;
  }
  if (!hasEntries) lines.push('');
  $('out').value = lines.join('\n');
}
function applyLang(){
  $('freeLabel').textContent = T('free');
  $('paidLabel').textContent = T('paid');
  $('copy').setAttribute('title', T('copy'));
  $('copy').setAttribute('aria-label', T('copy'));
  $('resetAll').setAttribute('title', T('reset'));
  $('resetAll').setAttribute('aria-label', T('reset'));
  $('out').setAttribute('placeholder', T('placeholder'));
}
function changeCount(type, delta){
  const current = getCurrentObject();
  setCount(type, current.id, getCount(type, current.id) + delta);
  renderCurrentObject();
  buildText();
}

$('objectSelect').addEventListener('change', (e) => {
  setCurrentObjectId(e.target.value);
  renderCurrentObject();
});
$('freeInc').addEventListener('click', () => changeCount('free', 1));
$('freeDec').addEventListener('click', () => changeCount('free', -1));
$('paidInc').addEventListener('click', () => changeCount('paid', 1));
$('paidDec').addEventListener('click', () => changeCount('paid', -1));
$('resetAll').addEventListener('click', () => {
  if (!confirm(T('resetAsk'))) return;
  resetAllCounts();
  renderCurrentObject();
  buildText();
  showToast('resetDone');
});
$('copy').addEventListener('click', async () => {
  const text = $('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    $('out').focus();
    $('out').select();
    document.execCommand('copy');
  }
  showToast('copied');
});

migrateLegacyCounts();
renderObjectSelect();
applyLang();
computeShift();
renderCurrentObject();
buildText();
window.addEventListener('focus', () => { computeShift(); buildText(); renderCurrentObject(); });
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible'){ computeShift(); buildText(); renderCurrentObject(); } });
window.addEventListener('pageshow', () => { computeShift(); buildText(); renderCurrentObject(); });
setInterval(() => { computeShift(); buildText(); }, 30000);
</script>
<script src="pwa-update.js?v=20260413fix4"></script>
</body>
</html>
