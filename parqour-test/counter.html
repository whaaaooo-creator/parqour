<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Parqour — Счётчик</title>
<link rel="stylesheet" href="style.css?v=20260415pro10">
<script src="i18n.js"></script>
<script src="numeric.js" defer></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container">
  <div class="header">
    <a class="home" href="index.html?v=20260415pro10" aria-label="Главная">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
  </div>

  <div class="card metric-card">
    <div class="metric-head"><div class="metric-label" id="lblFree">Бесплатные</div><div id="countFree" class="count metric-count">0</div></div>
    <div class="grid2 metric-actions">
      <button class="full positive" id="incFree">+1</button>
      <button class="full negative" id="decFree">−1</button>
    </div>
  </div>

  <div class="card metric-card">
    <div class="metric-head"><div class="metric-label" id="lblPaid">Платные</div><div id="countPaid" class="count metric-count">0</div></div>
    <div class="grid2 metric-actions">
      <button class="full positive" id="incPaid">+1</button>
      <button class="full negative" id="decPaid">−1</button>
    </div>
  </div>

  <button class="full accent" id="saveReset" style="margin-top:12px">Сохранить и сбросить</button>

  <div class="card journal-card">
    <div class="row" style="display:flex;justify-content:space-between;align-items:center">
      <div class="label" id="lblJournal">Журнал</div>
      <button class="clearfab" id="clearJournal" aria-label="Очистить журнал" title="Очистить журнал"><svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v11zm3.5-8h1.5v7h-1.5v-7zm5 0H16v7h-1.5v-7z"/><path d="M9 4V3h6v1h5v2H4V4h5z"/></svg></button>
    </div>
    <div class="tablewrap" style="margin-top:12px">
      <table id="journalTable">
        <thead><tr><th>#</th><th id="thTime">Время</th><th id="thName">Имя</th><th id="thFree">Бесплатные</th><th id="thPaid">Платные</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div></div>

<script>
const t={
  ru:{free:'Бесплатные',paid:'Платные',save:'Сохранить и сбросить',journal:'Журнал',clear:'Очистить журнал',time:'Время',name:'Имя',askName:'Введите имя',clearAsk:'Очистить журнал?'},
  az:{free:'Pulsuz',paid:'Ödənişli',save:'Saxla və sıfırla',journal:'Jurnal',clear:'Jurnalı təmizlə',time:'Vaxt',name:'Ad',askName:'Adı yazın',clearAsk:'Jurnal təmizlənsin?'}
};
const L=(k)=>((t[window.__lang]||t.ru)[k]);
function applyLang(){
  document.getElementById('lblFree').textContent=L('free');
  document.getElementById('lblPaid').textContent=L('paid');
  document.getElementById('saveReset').textContent=L('save');
  document.getElementById('lblJournal').textContent = L('journal');
  const cj=document.getElementById('clearJournal');
  if(cj){ cj.setAttribute('title', L('clear')); cj.setAttribute('aria-label', L('clear')); }

  document.getElementById('thTime').textContent=L('time');
  document.getElementById('thName').textContent=L('name');
  document.getElementById('thFree').textContent=L('free');
  document.getElementById('thPaid').textContent=L('paid');}
applyLang();

const $=(id)=>document.getElementById(id);
const get=(k,def=0)=>{const r=localStorage.getItem(k); if(r==null) return def; try{return JSON.parse(r)}catch{return r}};
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function renderCounts(){ $('countFree').textContent=Number(get('countFree',0)); $('countPaid').textContent=Number(get('countPaid',0)); }
function inc(key,delta){ const next=Number(get(key,0))+delta; set(key,Math.max(0,next)); renderCounts(); }
function saveToJournal(name,freeVal,paidVal){ const j=get('journal',[]); const ts=new Date().toISOString(); j.push({ts,name:name||'',free:freeVal,paid:paidVal}); set('journal',j); renderJournal(); }
function renderJournal(){ const j=get('journal',[]); const tb=document.querySelector('#journalTable tbody'); tb.innerHTML=''; const rows=[...j].map((e,i)=>({...e,idx:i+1})).reverse(); rows.forEach((e,i)=>{ const tr=document.createElement('tr'); const nm=(e.name||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m)); tr.innerHTML=`<td>${rows.length-i}</td><td>${new Date(e.ts).toLocaleString()}</td><td>${nm||'—'}</td><td>${e.free}</td><td>${e.paid}</td>`; tb.appendChild(tr); }); }
$('incFree').onclick=()=>inc('countFree',+1); $('decFree').onclick=()=>inc('countFree',-1); $('incPaid').onclick=()=>inc('countPaid',+1); $('decPaid').onclick=()=>inc('countPaid',-1);
$('saveReset').onclick=()=>{ const name=prompt(L('askName'),''); if(name===null) return; const trimmed=(name||'').trim(); if(!trimmed) return; const f=Number(get('countFree',0)); const p=Number(get('countPaid',0)); saveToJournal(trimmed,f,p); set('countFree',0); set('countPaid',0); renderCounts(); };
$('clearJournal').onclick=()=>{ if(confirm(L('clearAsk'))){ set('journal',[]); renderJournal(); } };
if(get('countFree')==null) set('countFree',0); if(get('countPaid')==null) set('countPaid',0); if(get('journal')==null) set('journal',[]);
renderCounts(); renderJournal();
</script>
<script src="pwa-update.js?v=20260415pro10"></script>
</body>
</html>
