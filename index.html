<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0e18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour</title>
<link rel="stylesheet" href="style.css?v=13">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container homepage">
  <div class="header homeheader">
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
      <button id="btnAZ" onclick="__setLang('az')">AZ</button>
    </div>
  </div>

  <div class="homegrid cleanhome homegrid-v3">
    <a class="tilehome cardcounter v3" href="counter.html" id="tileCounter">
      <span class="tileicon ringicon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle class="track" cx="12" cy="12" r="7.25"></circle>
          <path class="seg1" d="M12 4.75a7.25 7.25 0 0 1 5.13 2.12"></path>
          <path class="seg2" d="M6.87 17.13A7.25 7.25 0 0 1 12 4.75"></path>
          <path class="seg3" d="M17.13 6.87A7.25 7.25 0 0 1 12 19.25"></path>
        </svg>
      </span>
      <span class="tilelabel">Счётчик сессий</span>
      <span class="tileline" aria-hidden="true"></span>
    </a>

    <a class="tilehome cardsupport v3" href="support2.html" id="tileSupport2">
      <span class="tileicon ringicon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle class="track" cx="12" cy="12" r="7.25"></circle>
          <path class="seg1" d="M12 4.75a7.25 7.25 0 0 1 5.13 2.12"></path>
          <path class="seg2" d="M6.87 17.13A7.25 7.25 0 0 1 12 4.75"></path>
          <path class="seg3" d="M17.13 6.87A7.25 7.25 0 0 1 12 19.25"></path>
        </svg>
      </span>
      <span class="tilelabel">Support 2</span>
      <span class="tileline" aria-hidden="true"></span>
    </a>

    <a class="tilehome cardreport v3" href="report.html" id="tileReport">
      <span class="tileicon docicon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path class="doc" d="M8 3.5h6l4 4V20H8z"></path>
          <path class="doc" d="M14 3.5v4h4"></path>
          <line class="docline" x1="10" y1="11" x2="16" y2="11"></line>
          <line class="docline" x1="10" y1="14.5" x2="16" y2="14.5"></line>
          <line class="accent" x1="10" y1="7.2" x2="14.4" y2="7.2"></line>
        </svg>
      </span>
      <span class="tilelabel">Бабек отчёт</span>
      <span class="tileline" aria-hidden="true"></span>
    </a>

    <a class="tilehome cardauto v3" href="autofetch.html" id="tileAuto">
      <span class="tileicon docicon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path class="doc" d="M8 3.5h6l4 4V20H8z"></path>
          <path class="doc" d="M14 3.5v4h4"></path>
          <line class="docline" x1="10" y1="11" x2="16" y2="11"></line>
          <line class="docline" x1="10" y1="14.5" x2="16" y2="14.5"></line>
          <line class="accent" x1="10" y1="7.2" x2="14.4" y2="7.2"></line>
        </svg>
      </span>
      <span class="tilelabel">Короглу отчёт</span>
      <span class="tileline" aria-hidden="true"></span>
    </a>
  </div>

  <div class="footer homefoot" id="footnote"></div>
</div>

<script>
const t={
  ru:{counter:'Счётчик сессий', support2:'Support 2', report:'Бабек отчёт', auto:'Короглу отчёт', note:'Все данные сохраняются локально в вашем браузере.'},
  az:{counter:'Sessiya sayan', support2:'Support 2', report:'Babək hesabat', auto:'Koroğlu hesabat', note:'Bütün məlumatlar brauzerinizdə lokal saxlanılır.'}
};
function apply(){
  const l=(window.__lang==='az')?'az':'ru';
  document.querySelector('#tileCounter .tilelabel').textContent=t[l].counter;
  document.querySelector('#tileReport .tilelabel').textContent=t[l].report;
  document.querySelector('#tileSupport2 .tilelabel').textContent=t[l].support2;
  document.querySelector('#tileAuto .tilelabel').textContent=t[l].auto;
  document.getElementById('footnote').textContent=t[l].note;
  document.getElementById('btnRU').classList.toggle('active', l==='ru');
  document.getElementById('btnAZ').classList.toggle('active', l==='az');
}
apply();
</script>
<script src="pwa-update.js"></script>
</body>
</html>
