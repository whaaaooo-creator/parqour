<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0e18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour</title>
<link rel="stylesheet" href="style.css?v=12">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container homepage">
  <div class="header homeheader">
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
      <button id="btnAZ" onclick="__setLang('az')">AZ</button>
    </div>
  </div>

  <div class="homegrid cleanhome">
    <a class="tilehome cardcounter" href="counter.html" id="tileCounter">
      <span class="tileicon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="3"></rect><line x1="8" y1="8" x2="16" y2="8"></line><circle cx="8.5" cy="12"></circle><circle cx="12" cy="12"></circle><circle cx="15.5" cy="12"></circle><circle cx="8.5" cy="16"></circle><circle cx="12" cy="16"></circle><circle cx="15.5" cy="16"></circle></svg>
      </span>
      <span class="tilelabel">Счётчик сессий</span>
    </a>

    <a class="tilehome cardsupport" href="support2.html" id="tileSupport2">
      <span class="tileicon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><line x1="6" y1="7" x2="18" y2="7"></line><circle cx="9" cy="7" r="2"></circle><line x1="6" y1="12" x2="18" y2="12"></line><circle cx="15" cy="12" r="2"></circle><line x1="6" y1="17" x2="18" y2="17"></line><circle cx="11" cy="17" r="2"></circle></svg>
      </span>
      <span class="tilelabel">Support 2</span>
    </a>

    <a class="tilehome cardreport" href="report.html" id="tileReport">
      <span class="tileicon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M8 3.5h6l4 4V20H8z"></path><path d="M14 3.5v4h4"></path><line x1="10" y1="11" x2="16" y2="11"></line><line x1="10" y1="14.5" x2="16" y2="14.5"></line><line x1="10" y1="18" x2="16" y2="18"></line></svg>
      </span>
      <span class="tilelabel">Бабек отчёт</span>
    </a>

    <a class="tilehome cardauto" href="autofetch.html" id="tileAuto">
      <span class="tileicon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M8 3.5h6l4 4V20H8z"></path><path d="M14 3.5v4h4"></path><line x1="10" y1="11" x2="16" y2="11"></line><line x1="10" y1="14.5" x2="14" y2="14.5"></line><path d="M15.5 14.7v1.4"></path><path d="M15.5 19v1.4"></path><path d="M13.35 17.85h1.4"></path><path d="M17.65 17.85h1.4"></path><circle cx="15.5" cy="17.85" r="2.15"></circle></svg>
      </span>
      <span class="tilelabel">Короглу отчёт</span>
    </a>
  </div>

  <div class="footer homefoot" id="footnote"></div>
</div>

<script>
const t={
  ru:{counter:'Счётчик сессий', support2:'Support 2', report:'Бабек отчёт', auto:'Короглу отчёт', note:'Все данные сохраняются локально в вашем браузере.'},
  az:{counter:'Sessiya sayan', support2:'Support 2', report:'Babək hesabat', auto:'Koroğlu hesabat', note:'Bütün məlumatlar brauzerinizdə lokal saxlanılır.'}
};
function apply(){
  const l=(window.__lang==='az')?'az':'ru';
  document.querySelector('#tileCounter .tilelabel').textContent=t[l].counter;
  document.querySelector('#tileReport .tilelabel').textContent=t[l].report;
  document.querySelector('#tileSupport2 .tilelabel').textContent=t[l].support2;
  document.querySelector('#tileAuto .tilelabel').textContent=t[l].auto;
  document.getElementById('footnote').textContent=t[l].note;
  document.getElementById('btnRU').classList.toggle('active', l==='ru');
  document.getElementById('btnAZ').classList.toggle('active', l==='az');
}
apply();
</script>
<script src="pwa-update.js"></script>
</body>
</html>
