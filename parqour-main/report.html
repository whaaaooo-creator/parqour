.fetch-grid{display:grid;gap:12px}
.fetch-actions{display:grid;gap:10px;grid-template-columns:1fr}
.fetch-status{margin-top:8px;font-size:13px;color:var(--muted);min-height:18px}
.fetch-primary{background:linear-gradient(180deg,#345dff 0%,#213fc6 100%) !important;border-color:#5377ff !important}
.fetch-header{position:relative;justify-content:center}
.fetch-header .home{position:absolute;left:0;top:50%;transform:translateY(-50%)}
.fetch-header img{margin:0 auto}
.fetch-card-main{position:relative;overflow:visible}
.fetch-compact-wrap{margin-top:12px;padding:0;border:none;background:none;box-shadow:none}
.fetch-compact-wrap .ta{min-height:88px;font-size:12.5px;padding:10px 12px;border:2px dashed rgba(101,126,177,.72);border-radius:18px;background:rgba(10,15,26,.42)}
.session-object-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.session-object-btn{width:100%;padding:15px 18px;border-radius:18px;border:1px solid rgba(61,74,106,.82);background:linear-gradient(180deg,rgba(22,29,46,.98) 0%,rgba(13,18,29,.98) 100%);color:var(--text);font-size:16px;font-weight:800;line-height:1.3;text-align:left;white-space:normal;box-shadow:var(--shadow-soft)}
.session-object-head{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px}
.session-object-title{display:block;min-width:0;font-size:16px;font-weight:800;color:var(--text)}
.session-object-side{display:inline-flex;align-items:center;gap:12px;justify-self:end}
.session-object-stats{display:inline-flex;align-items:center;gap:12px}
.session-object-stat{display:grid;grid-template-columns:17px 3ch;align-items:center;column-gap:6px;width:calc(17px + 6px + 3ch)}
.session-object-count{display:inline-block;width:3ch;text-align:left;font-variant-numeric:tabular-nums}
.session-object-icon{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;flex:0 0 17px}
.session-object-icon-mask{display:block;width:17px;height:17px;background-color:currentColor;-webkit-mask-image:var(--session-icon);mask-image:var(--session-icon);-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;-webkit-mask-size:contain;mask-size:contain}
.session-object-light{position:relative;display:inline-flex;align-items:center;justify-content:center;width:10px;height:10px;flex:0 0 10px;border-radius:999px;background:rgba(173,182,207,.38);box-shadow:0 0 0 1px rgba(173,182,207,.12)}
.session-object-light::after{content:'';position:absolute;inset:-4px;border-radius:999px;background:transparent}
.session-object-light.is-loading{background:#ffd347;box-shadow:0 0 0 1px rgba(255,211,71,.18),0 0 12px rgba(255,211,71,.45)}
.session-object-light.is-loading::after{background:rgba(255,211,71,.26);animation:sessionPulse 1.15s ease-in-out infinite}
.session-object-light.is-ready{background:#3cd28f;box-shadow:0 0 0 1px rgba(60,210,143,.2),0 0 12px rgba(60,210,143,.42)}
.session-object-light.is-error{background:#ff6f87;box-shadow:0 0 0 1px rgba(255,111,135,.18),0 0 12px rgba(255,111,135,.32)}
.fetch-card-main .fetch-report-light{position:absolute;top:12px;right:12px;z-index:3;pointer-events:none;transform:none}
.session-object-btn.is-loading{opacity:.82}
.session-object-btn.is-error{border-color:#de708a}
@keyframes sessionPulse{
  0%,100%{transform:scale(.7);opacity:.38}
  50%{transform:scale(1.35);opacity:.9}
}
.kcounter-out{border:2px dashed rgba(101,126,177,.72) !important;background:rgba(10,15,26,.42) !important}
.kcounter-shell{margin-top:12px;padding:14px;border-radius:22px;border:1px solid var(--border);background:linear-gradient(180deg,var(--surface-2) 0%, var(--surface-3) 100%);box-shadow:var(--shadow-soft)}
.kcounter-topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"label label" "picker actions";gap:6px 8px;align-items:center;margin-bottom:12px}
.kcounter-topleft{display:contents}
.kcounter-toplabel{grid-area:label;margin:0 0 0 2px;font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.01em}
.kcounter-topactions{grid-area:actions;display:flex;gap:8px;align-items:center;justify-self:end;position:static;transform:none}
.kcounter-picker{grid-area:picker;margin-bottom:0;min-width:0}
.kcounter-select{width:100%;padding:15px 48px 15px 18px;border-radius:18px;border:2px solid #3f78ff;background:linear-gradient(180deg,#14203a 0%,#0f1729 100%);color:var(--text);font-size:18px;font-weight:800;appearance:none;-webkit-appearance:none;background-image:linear-gradient(180deg,#14203a 0%,#0f1729 100%),linear-gradient(45deg,transparent 50%,#dbe7ff 50%),linear-gradient(135deg,#dbe7ff 50%,transparent 50%);background-position:left top,calc(100% - 24px) calc(50% - 3px),calc(100% - 18px) calc(50% - 3px);background-size:100% 100%,7px 7px,7px 7px;background-repeat:no-repeat;box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.04)}
.kcounter-select:focus{outline:none;border-color:#6896ff;box-shadow:0 0 0 3px rgba(75,126,255,.18),var(--shadow-soft)}
.kcounter-stack{display:flex;flex-direction:column;gap:12px}
.kcounter-counter{padding:16px;border-radius:22px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(22,29,46,.98) 0%,rgba(13,18,29,.98) 100%);box-shadow:var(--shadow-soft)}
.kcounter-counterhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.kcounter-label{font-size:16px;font-weight:800;color:var(--text-soft)}
.kcounter-count{font-size:40px;line-height:1;font-weight:800;color:var(--text)}
.kcounter-buttons{display:flex;align-items:stretch;gap:10px}
.kcounter-btn{border:1px solid transparent;border-radius:18px;color:#fff;font-weight:800;letter-spacing:-.01em}
.kcounter-btn.plus{flex:1;min-height:56px;font-size:21px;background:linear-gradient(180deg,var(--success) 0%, var(--success-deep) 100%);border-color:#46cfb1;box-shadow:0 8px 18px rgba(14,93,78,.24), inset 0 1px 0 rgba(255,255,255,.05)}
.kcounter-btn.minus{width:80px;min-width:80px;min-height:50px;font-size:17px;background:linear-gradient(180deg,var(--danger) 0%, var(--danger-deep) 100%);border-color:#de708a;box-shadow:0 6px 14px rgba(92,33,51,.24), inset 0 1px 0 rgba(255,255,255,.05)}
.kcounter-outcard{margin-top:12px;padding:0;border:none;background:none;box-shadow:none}
.kcounter-out{min-height:94px;font-size:13px;padding:10px 12px;border:2px dashed rgba(101,126,177,.72);border-radius:18px;background:rgba(10,15,26,.42)}
.kcounter-history{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.kcounter-history[hidden]{display:none}
.kcounter-historyitem{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;padding:12px 14px;border:1px solid rgba(61,74,106,.82);border-radius:18px;background:linear-gradient(180deg,rgba(18,24,38,.96) 0%,rgba(11,16,28,.96) 100%);box-shadow:var(--shadow-soft)}
.kcounter-historytime{min-width:0;display:flex;align-items:center;gap:10px;color:var(--text);font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
.kcounter-historytime::before{content:'';flex:0 0 auto;width:8px;height:8px;border-radius:999px;background:#5f87ff;box-shadow:0 0 0 4px rgba(95,135,255,.12)}
.kcounter-historyactions{display:flex;gap:8px;align-items:center;justify-self:end}

function getNearestShiftRange(now = new Date()){
  const points = [];
  for(let d = -1; d <= 1; d++){
    const day = new Date(now.getFullYear(), now.getMonth(), now.getDate() + d, 0, 0, 0, 0);
    points.push(new Date(day.getFullYear(), day.getMonth(), day.getDate(), 7, 0, 0, 0));
    points.push(new Date(day.getFullYear(), day.getMonth(), day.getDate(), 19, 0, 0, 0));
  }
  let nearest = points[0];
  let best = Math.abs(now - nearest);
  for(const point of points){
    const diff = Math.abs(now - point);
    if(diff < best){
      best = diff;
      nearest = point;
    }
  }
  let start;
  let end;
  if(nearest.getHours() === 19){
    start = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 7, 0, 0, 0);
    end = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 19, 0, 0, 0);
  }else{
    end = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 7, 0, 0, 0);
    start = new Date(end.getTime() - 12 * 60 * 60 * 1000);
  }
  return {start, end};
}

function applyAutoShift(force = false){
  const range = getNearestShiftRange();
  const nextStart = dtLocal(range.start);
  const nextEnd = dtLocal(range.end);
  const changed = $('startDT').value !== nextStart || $('endDT').value !== nextEnd;
  if(force || changed){
    $('startDT').value = nextStart;
    $('endDT').value = nextEnd;
    saveRange();
    return true;
  }
  return false;
}

async function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    try{
      await navigator.clipboard.writeText(text);
      return;
    }catch(_){
    }
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  ta.style.pointerEvents = 'none';
  document.body.appendChild(ta);
  let copied = false;
  try{
    ta.focus();
    ta.select();
    if(typeof ta.setSelectionRange === 'function'){
      ta.setSelectionRange(0, ta.value.length);
    }
    copied = document.execCommand('copy');
  }finally{
    document.body.removeChild(ta);
  }
  if(!copied){
    throw new Error('copy-blocked');
  }
}

async function postJson(base, url, payload, refererPath){
  const headers = {
    'accept':'application/json, text/javascript, */*; q=0.01',
    'content-type':'application/json',
    'x-requested-with':'XMLHttpRequest'
  };
  const extra = {};
  try{
    extra.referrer = base + refererPath;
  }catch(_){}
  let res;
  try{
    res = await fetch(url, {
      method:'POST',
      credentials:'include',
      mode:'cors',
      headers,
      body: JSON.stringify(payload),
      ...extra
    });
  }catch(err){
    const e = new Error(tr('cors'));
    e.cause = err;
    throw e;
  }
  if(!res.ok){
    throw new Error(`HTTP ${res.status}`);
  }
  return res.json();
}

  return 0;
}

function parseAuditCreated(value){
  const [datePart, timePart = '00:00:00'] = String(value || '').trim().split(' ');
  const [year, month, day] = datePart.split('-').map(Number);
  const [hours, minutes, seconds] = timePart.split(':').map(Number);
  return new Date(year, (month || 1) - 1, day || 1, hours || 0, minutes || 0, seconds || 0, 0);
}

function classifySession(session){
  if(!session) return 'unknown';
  const amount = session.rateAmount == null ? 0 : Number(session.rateAmount);
  if(Number.isNaN(amount)) return 'unknown';
  return amount > 0 ? 'paid' : 'free';
}

async function mapWithConcurrency(items, limit, worker){
  const results = new Array(items.length);
  let index = 0;
  const runners = Array.from({length: Math.max(1, Math.min(limit, items.length || 1))}, async () => {
    while(index < items.length){
      const current = index++;
      results[current] = await worker(items[current], current);
    }
  });
  await Promise.all(runners);
  return results;
}

  const url = `${object.base}/rest/audit/list?dateFrom=${encodeURIComponent(start)}&dateTo=${encodeURIComponent(end)}&eventType=CAR_STATE_CLOSE&userName=&plateNumber=`;
  return postJson(object.base, url, makeSessionAuditPayload(), '/audit/list?lang=ru');

async function fetchMatchedSession(object, row){
  const createdAt = parseAuditCreated(row.created);
  const dateTo = dtLocal(new Date(createdAt.getTime() + SESSION_LOOKAHEAD_DAYS * 24 * 60 * 60 * 1000));
  const dateFrom = dtLocal(new Date(createdAt.getTime() - SESSION_LOOKBACK_DAYS * 24 * 60 * 60 * 1000));
  for(let page = 0; page < SESSION_LOOKUP_MAX_PAGES; page++){
    const payload = makeSessionCarStateLookupPayload(dateFrom, dateTo, row.carNumber);
    payload.start = page * SESSION_LOOKUP_PAGE_SIZE;
    const response = await postJson(
      object.base,
      `${object.base}/rest/carstate`,
      payload,
      '/journal/list?lang=ru'
    );
    const list = Array.isArray(response && response.data) ? response.data : [];
    const matched = list.find(item => Number(item.id) === Number(row.targetRowId)) || null;
    if(matched) return matched;
    if(list.length < SESSION_LOOKUP_PAGE_SIZE) break;
  }
  return null;
}

async function computeAutoSessionStats(object, start, end){
  const audit = await fetchSessionAuditCloseRows(object, start, end);
  const rows = Array.isArray(audit && audit.data) ? audit.data : [];
  if(!rows.length) return { free:0, paid:0, unresolved:0, total:0 };
  const sessions = await mapWithConcurrency(rows, SESSION_FETCH_CONCURRENCY, async (row) => {
    try{
      return await fetchMatchedSession(object, row);
    }catch(_){
      return null;
    }
  });
  const stats = { free:0, paid:0, unresolved:0, total:rows.length };
  for(const session of sessions){
    const type = classifySession(session);
    if(type === 'free') stats.free += 1;
    else if(type === 'paid') stats.paid += 1;
    else stats.unresolved += 1;
  }
  return stats;
}

async function runSessionCounterSafe(start, end){
  setSessionCardStatus(tr('running'));
  $('sessionRunBtn').disabled = true;
  resetSessionObjectButtons();
  $('sessionOut').value = '';
  const completed = [];
  try{
    for(const object of SESSION_OBJECTS){
      if(!object.enabled) continue;
      setSessionObjectButtonText(object, sessionButtonLoadingHtml(object), 'loading');
      const stats = await computeAutoSessionStats(object, start, end);
      completed.push({object, stats});
      setSessionObjectButtonText(object, sessionButtonDoneHtml(object, stats));
      renderSessionSummary(start, end, completed);
    }
    const totals = aggregateSessionStats(completed);
    const copied = await tryCopyText($('sessionOut').value, 'sessionOut');
    setSessionCardStatus(sessionStatusAfterCopy(totals, copied));
    if(copied) showToast(tr('copied'));
  }catch(error){
    console.error(error);
    const activeObject = SESSION_OBJECTS.find(object => object.enabled && $(object.buttonId) && $(object.buttonId).classList.contains('is-loading'));
    if(activeObject) setSessionObjectButtonText(activeObject, sessionButtonErrorHtml(activeObject), 'error');
    setSessionCardStatus(sessionFailedText(error && error.message ? error.message : tr('failed')));
  }finally{
    $('sessionRunBtn').disabled = false;
  }
}

function getNearestSessionShiftRange(now = new Date()){
  const points = [];
  for(let d = -1; d <= 1; d++){
    points.push(new Date(now.getFullYear(), now.getMonth(), now.getDate() + d, 7, 0, 0, 0));
  }
  let nearest = points[0];
  let best = Math.abs(now - nearest);
  for(const point of points){
    const diff = Math.abs(now - point);
    if(diff < best){
      best = diff;
      nearest = point;
    }
  }
  const end = nearest;
  const start = new Date(end.getTime() - 12 * 60 * 60 * 1000);
  return {start, end};
}

function isCurrentSessionRangeAutoSelected(){
  const range = getNearestSessionShiftRange();
  return $('sessionStartDT').value === dtLocal(range.start) && $('sessionEndDT').value === dtLocal(range.end);

function applySessionAutoShift(force = false){
  if(!force && !sessionAutoRangePinned) return false;
  const range = getNearestSessionShiftRange();
  const nextStart = dtLocal(range.start);
  const nextEnd = dtLocal(range.end);
  const changed = $('sessionStartDT').value !== nextStart || $('sessionEndDT').value !== nextEnd;
  if(force || changed){
    $('sessionStartDT').value = nextStart;
    $('sessionEndDT').value = nextEnd;
    saveSessionRange();
    sessionAutoRangePinned = true;
    return true;
  }
  return false;
}

  });
}

async function runFetch(){
  const start = $('startDT').value;
  const end = $('endDT').value;
  if(!start || !end){
    setStatus('');
    setReportLight('idle');
    return;
  }
  saveRange();
  setStatus(tr('running'));
  setReportLight('loading');
  $('runBtn').disabled = true;
  try{
    const results = [];
    for(const cfg of OBJECTS){
      results.push(await fetchObjectStatsSafe(cfg, start, end));
    }
    const failed = results.filter(result => !result.ok);
    if(failed.length){
      $('out').value = formatDiagnostics(start, end, results);
      setStatus(tr('partial'));
      setReportLight('error');
      return;
    }
    const text = formatRuReport(start, end, results);
    $('out').value = text;
    const copied = await tryCopyText(text, 'out');
    setStatus(autoStatusAfterCopy(copied));
    setReportLight('ready');
    if(copied) showToast(tr('copied'));
  }catch(err){
    console.error(err);
    const msg = err && err.message ? err.message : tr('failed');
    setStatus(msg);
    $('out').value = `ERROR\n\n${msg}`;
    setReportLight('error');
  }finally{
    $('runBtn').disabled = false;
  }
}

function kCountKey(type, objectId){ return `babek_counter_${objectId}_${type}`; }
function kGetCount(type, objectId){ return Number(localStorage.getItem(kCountKey(type, objectId)) || '0'); }
function kSetCount(type, objectId, value){ localStorage.setItem(kCountKey(type, objectId), String(Math.max(0, value))); }
function kResetAllCounts(){
  for(const object of KOBJ){
    localStorage.removeItem(kCountKey('free', object.id));
    localStorage.removeItem(kCountKey('paid', object.id));
  }
}
function kResetAskText(){
  return lang() === 'az'
    ? 'Bab\u0259k say\u011faclar\u0131n\u0131n ham\u0131s\u0131 s\u0131f\u0131rlans\u0131n?'
    : '\u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c \u0432\u0441\u0435 \u0441\u0447\u0451\u0442\u0447\u0438\u043a\u0438 \u0411\u0430\u0431\u0435\u043a?';
}
function kResetDoneText(){
  return lang() === 'az'
    ? 'Say\u011faclar s\u0131f\u0131rland\u0131!'
    : '\u0421\u0447\u0451\u0442\u0447\u0438\u043a\u0438 \u0441\u0431\u0440\u043e\u0448\u0435\u043d\u044b!';
}
function kCurrentId(){
  const saved = localStorage.getItem(KCURRENT_KEY);
  return KOBJ.some(o => o.id === saved) ? saved : KOBJ[0].id;
}
function kSetCurrentId(id){ localStorage.setItem(KCURRENT_KEY, id); }
function kRenderSelect(){
  const select = $('kObjectSelect');
  if(!select) return;
  select.innerHTML = KOBJ.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
  select.value = kCurrentId();
}
function kRenderCurrent(){
  const id = kCurrentId();
  $('kObjectSelect').value = id;
  $('kFreeCount').textContent = kGetCount('free', id);
  $('kPaidCount').textContent = kGetCount('paid', id);
}
function kFormatStamp(date){
  return `${pad(date.getDate())}.${pad(date.getMonth() + 1)}.${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function kGetNightShiftRange(now = new Date()){
  let start;
  let end;
  if(now.getHours() >= 19){
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 19, 0, 0, 0);
    end = new Date(start.getTime() + 12 * 60 * 60 * 1000);
  }else{
    end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 0, 0, 0);
    start = new Date(end.getTime() - 12 * 60 * 60 * 1000);
  }
  return {start, end};
}
function kShiftKeyFromRange(range){
  return `${range.start.getFullYear()}-${pad(range.start.getMonth() + 1)}-${pad(range.start.getDate())}T${pad(range.start.getHours())}:${pad(range.start.getMinutes())}`;
}
function kCurrentShiftKey(now = new Date()){
  return kShiftKeyFromRange(kGetNightShiftRange(now));
}
function kComposeText(range = kGetNightShiftRange()){
  const lines = [
    kFormatStamp(range.start),
    kFormatStamp(range.end),
    ''
  ];
  for(const object of KOBJ){
    lines.push(`*${object.reportRu}*`);
    lines.push(`\u0411\u0435\u0441\u043f\u043b\u0430\u0442\u043d\u044b\u0435 \u0441\u0435\u0441\u0441\u0438\u0438: ${kGetCount('free', object.id)}`);
    lines.push(`\u041f\u043b\u0430\u0442\u043d\u044b\u0435 \u0441\u0435\u0441\u0441\u0438\u0438: ${kGetCount('paid', object.id)}`);
  }
  return lines.join('\n');
}
function kBuildText(){
  $('kOut').value = kComposeText();
}
function kResetHistory(){
  const raw = localStorage.getItem(KLAST_RESET_KEY);
  if(!raw) return [];
  try{
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed)){
      const cleaned = parsed
        .map(item => typeof item === 'string' ? item.trim() : '')
        .filter(item => item && !item.includes('\n') && !item.includes('*'));
      if(JSON.stringify(cleaned) !== JSON.stringify(parsed)){
        localStorage.setItem(KLAST_RESET_KEY, JSON.stringify(cleaned));
      }
      return cleaned;
    }
  }catch(_){}
  const legacy = raw.trim();
  if(!legacy || legacy.includes('\n') || legacy.includes('*')){
    localStorage.removeItem(KLAST_RESET_KEY);
    return [];
  }
  const migrated = [legacy];
  localStorage.setItem(KLAST_RESET_KEY, JSON.stringify(migrated));
  return migrated;
}
function kSaveResetHistory(items){
  const cleaned = items
    .map(item => typeof item === 'string' ? item.trim() : '')
    .filter(Boolean);
  if(!cleaned.length){
    localStorage.removeItem(KLAST_RESET_KEY);
    kRenderLastReset();
    return;
  }
  localStorage.setItem(KLAST_RESET_KEY, JSON.stringify(cleaned));
  kRenderLastReset();
}
function kHistoryButtonMarkup(action, index, title){
  const icon = action === 'delete'
    ? '<svg viewBox="0 0 24 24"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v11zm3.5-8h1.5v7h-1.5v-7zm5 0H16v7h-1.5v-7z"></path><path d="M9 4V3h6v1h5v2H4V4h5z"></path></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"></path><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"></path></svg>';
  return `<button class="support2-headbtn" type="button" data-history-action="${action}" data-history-index="${index}" aria-label="${title}" title="${title}">${icon}</button>`;
}
function kEscapeHtml(text){
  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}
function kRenderLastReset(){
  const wrap = $('kHistoryWrap');
  if(!wrap) return;
  const items = kResetHistory();
  wrap.hidden = items.length === 0;
  wrap.innerHTML = items.map((item, index) => `
    <div class="kcounter-historyitem">
      <div class="kcounter-historytime">${kEscapeHtml(item)}</div>
      <div class="kcounter-historyactions">
        ${kHistoryButtonMarkup('delete', index, tr('reset'))}
        ${kHistoryButtonMarkup('copy', index, tr('copy'))}
      </div>
    </div>
  `).join('');
}
function kPushResetHistory(text){
  const value = (text || '').trim();
  if(!value) return;
  const items = kResetHistory();
  items.unshift(value);
  kSaveResetHistory(items);
}
function kArchiveShiftText(){
  kPushResetHistory(kFormatStamp(new Date()));
}
function kRemoveResetHistoryItem(index){
  const items = kResetHistory();
  if(index < 0 || index >= items.length) return;
  items.splice(index, 1);
  kSaveResetHistory(items);
}
function kResetForCurrentShift(){
  kArchiveShiftText();
  kResetAllCounts();
  localStorage.setItem(KSHIFT_KEY, kCurrentShiftKey());
  kRenderCurrent();
  kBuildText();
}
function kSyncShiftReset(now = new Date()){
  const nextShiftKey = kCurrentShiftKey(now);
  const storedShiftKey = localStorage.getItem(KSHIFT_KEY);
  if(!storedShiftKey){
    localStorage.setItem(KSHIFT_KEY, nextShiftKey);
    return false;
  }
  if(storedShiftKey === nextShiftKey) return false;
  kArchiveShiftText();
  kResetAllCounts();
  localStorage.setItem(KSHIFT_KEY, nextShiftKey);
  kRenderCurrent();
  kBuildText();
  return true;
}
function kChange(type, delta){
  const id = kCurrentId();
  kSetCount(type, id, kGetCount(type, id) + delta);
  kRenderCurrent();
  kBuildText();
}
function initKCounter(){
  kRenderSelect();
  kSyncShiftReset();
  kRenderCurrent();
  kBuildText();
  kRenderLastReset();
  $('kObjectSelect').addEventListener('change', (e) => {
    kSetCurrentId(e.target.value);
    kRenderCurrent();
    kBuildText();
  });
  $('kFreeInc').addEventListener('click', () => kChange('free', 1));
  $('kFreeDec').addEventListener('click', () => kChange('free', -1));
  $('kPaidInc').addEventListener('click', () => kChange('paid', 1));
  $('kPaidDec').addEventListener('click', () => kChange('paid', -1));
  $('kReset').addEventListener('click', () => {
    if(!confirm(kResetAskText())) return;
    kResetForCurrentShift();
    showToast(kResetDoneText());
  });
  $('kCopy').addEventListener('click', async () => {
    try { await copyText($('kOut').value); } catch(_) {}
    showToast(tr('copied'));
  });
  $('kHistoryWrap').addEventListener('click', async (event) => {
    const button = event.target.closest('button[data-history-action]');
    if(!button) return;
    const index = Number(button.dataset.historyIndex);
    const items = kResetHistory();
    const text = items[index];
    if(!text) return;
    if(button.dataset.historyAction === 'delete'){
      kRemoveResetHistoryItem(index);
      return;
    }
    try { await copyText(text); } catch(_) {}
    showToast(tr('copied'));
  });
}

loadDefaults();
applyLang();
try{
  initSessionCard();
}catch(err){
  console.error(err);
  if($('sessionOut')) $('sessionOut').value = `Session error\n\n${err && err.message ? err.message : err}`;
}
$('runBtn').addEventListener('click', runFetch);
$('startDT').addEventListener('change', saveRange);
$('endDT').addEventListener('change', saveRange);

const refreshShiftIfNeeded = () => {
  if(document.visibilityState === 'hidden') return;
  applyAutoShift(false);
  if($('sessionRunBtn') && !$('sessionRunBtn').disabled && applySessionAutoShift(false)){
    $('sessionOut').value = '';
    resetSessionObjectButtons();
    setSessionCardStatus('');
  }
};

window.addEventListener('focus', refreshShiftIfNeeded);
document.addEventListener('visibilitychange', refreshShiftIfNeeded);
window.addEventListener('pageshow', refreshShiftIfNeeded);
setInterval(refreshShiftIfNeeded, AUTO_TICK_MS);
</script>
