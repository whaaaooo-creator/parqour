<!doctype html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.webmanifest?v=20260327b">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour Hub</title>
<link rel="stylesheet" href="style.css?v=20260327b">
<script src="i18n.js?v=20260327b"></script>
<link rel="apple-touch-icon" href="icon-180.png?v=20260327b" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=20260327b" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container">
  <div class="header">
    <img src="parqour.png" alt="Parqour">
    <div class="lang">
      <button id="btnEN" onclick="__setLang('en')">EN</button>
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
    </div>
  </div>

  <div class="card">
    <a class="tile" href="counter.html">➕ Counter</a>
    <a class="tile" href="report.html">🧾 Report (Отчёт)</a>
    <a class="tile" href="support2.html">🧩 Support 2</a>
    <a class="tile" href="autofetch.html">⚡ Auto Report</a>
  </div>

  <div class="footer" id="footnote"></div>
</div>

<script>
const t={
  en:{counter:'➕ Counter', report:'🧾 Report', support2:'🧩 Support 2', auto:'⚡ Auto Report', note:'All data is saved locally in your browser (persists after closing).'},
  ru:{counter:'➕ Счётчик', report:'🧾 Отчёт', support2:'🧩 Support 2', auto:'⚡ Автоотчёт', note:'Все данные сохраняются локально в вашем браузере (сохраняются после закрытия).'}
};
function apply(){
  const l=window.__lang||'en';
  const tiles=document.querySelectorAll('a.tile');
  tiles[0].textContent=t[l].counter;
  tiles[1].textContent=t[l].report;
  tiles[2].textContent=t[l].support2;
  tiles[3].textContent=t[l].auto;
  document.getElementById('footnote').textContent=t[l].note;
  document.getElementById(l==='en'?'btnEN':'btnRU').classList.add('active');
}
apply();
</script>
<script>
if('serviceWorker' in navigator){
  let refreshing=false;
  window.addEventListener('load', async ()=>{
    try{
      const reg=await navigator.serviceWorker.register('sw.js?v=20260327b');
      await reg.update();
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
      reg.addEventListener('updatefound', ()=>{
        const worker=reg.installing;
        if(!worker) return;
        worker.addEventListener('statechange', ()=>{
          if(worker.state==='installed' && navigator.serviceWorker.controller) worker.postMessage({type:'SKIP_WAITING'});
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', ()=>{
        if(refreshing) return;
        refreshing=true;
        location.reload();
      });
    }catch(e){}
  });
}
</script>
</body>
</html>
