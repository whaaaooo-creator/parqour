<link rel="apple-touch-startup-image" href="splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">

</head>
<body>
<div class="container homepage homepage-clean">
  <div class="header homeheader homeheader-clean">
    <img src="parqour.png" alt="Parqour">
    <div class="lang lang-segmented">
      <button id="btnRU" onclick="__setLang('ru')">RU</button>
      <button id="btnAZ" onclick="__setLang('az')">AZ</button>
    </div>
  </div>

  <div class="homegrid homegrid-clean">
    <a class="tilehome tile-clean tile-counter" href="counter.html?v=20260414pro8" id="tileCounter">
      <span class="tileicon tileicon-ring" aria-hidden="true"><img src="ring_home_v3.png" alt=""></span>
      <span class="tilelabel"></span>
      <span class="tileline" aria-hidden="true"></span>
    </a>

    <a class="tilehome tile-clean tile-support" href="support2.html?v=20260414pro8" id="tileSupport2">
      <span class="tileicon tileicon-doc" aria-hidden="true"><img src="document_home_v6.png" alt=""></span>
      <span class="tilelabel"></span>
      <span class="tileline" aria-hidden="true"></span>
    </a>

    <a class="tilehome tile-clean tile-report" href="report.html?v=20260414pro8" id="tileReport">
      <span class="tileicon tileicon-doc" aria-hidden="true"><img src="document_home_v6.png" alt=""></span>
      <span class="tilelabel"></span>
      <span class="tileline" aria-hidden="true"></span>
    </a>

    <a class="tilehome tile-clean tile-auto" href="autofetch.html?v=20260414pro8" id="tileAuto">
      <span class="tileicon tileicon-doc" aria-hidden="true"><img src="document_home_v6.png" alt=""></span>
      <span class="tilelabel"></span>
      <span class="tileline" aria-hidden="true"></span>
    </a>
  </div>

  <div class="footer homefoot homefoot-clean" id="footnote"></div>
</div>

<script>
const t = {
  ru: {
    counter: 'Счётчик<br>сессий',
    support2: 'Support II<br>отчёт',
    report: 'Бабек<br>отчёт',
    auto: 'Короглу<br>отчёт',
    note: 'Все данные сохраняются локально в вашем браузере.'
  },
  az: {
    counter: 'Sessiya<br>sayan',
    support2: 'Support II<br>hesabat',
    report: 'Babək<br>hesabat',
    auto: 'Koroğlu<br>hesabat',
    note: 'Bütün məlumatlar brauzerinizdə lokal saxlanılır.'
  }
};

function apply(){
  const l = window.__lang === 'az' ? 'az' : 'ru';
  document.querySelector('#tileCounter .tilelabel').innerHTML = t[l].counter;
  document.querySelector('#tileSupport2 .tilelabel').innerHTML = t[l].support2;
  document.querySelector('#tileReport .tilelabel').innerHTML = t[l].report;
  document.querySelector('#tileAuto .tilelabel').innerHTML = t[l].auto;
  document.getElementById('footnote').innerHTML = `<span class="homefoot-dot" aria-hidden="true"></span><span>${t[l].note}</span>`;
  document.getElementById('btnRU').classList.toggle('active', l === 'ru');
  document.getElementById('btnAZ').classList.toggle('active', l === 'az');
}

apply();
</script>
<script src="pwa-update.js?v=20260414pro8"></script>
</body>
</html>
