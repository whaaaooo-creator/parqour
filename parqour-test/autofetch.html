<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour Koroğlu Report</title>
<link rel="stylesheet" href="style.css?v=20">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
<style>
.fetch-grid{display:grid;gap:12px}
.fetch-actions{display:grid;gap:10px;grid-template-columns:1fr}
.fetch-status{margin-top:8px;font-size:13px;color:#cfd3db;min-height:18px}
.fetch-primary{background:#1f4530 !important;border-color:#335c45 !important}
.kg-extra{margin-top:12px}
.kg-extra .kg-select{width:100%;padding:14px 44px 14px 14px;border-radius:14px;border:1px solid var(--stroke);background:#111522;color:#fff;font-size:18px;font-weight:700;appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,#96a4c9 50%),linear-gradient(135deg,#96a4c9 50%,transparent 50%);background-position:calc(100% - 22px) calc(50% - 3px),calc(100% - 16px) calc(50% - 3px);background-size:6px 6px,6px 6px;background-repeat:no-repeat}
.kg-extra .kg-select:focus{outline:none;border-color:#4b89ff;box-shadow:0 0 0 2px rgba(75,137,255,.25)}
.kg-countergrid{display:grid;gap:12px;margin-top:12px;grid-template-columns:1fr 1fr}
.kg-countercard{background:#171b2a;border:1px solid var(--stroke);border-radius:16px;padding:14px}
.kg-countermeta{display:flex;justify-content:space-between;align-items:center;gap:10px}
.kg-countermeta .label{font-size:14px;opacity:.92}
.kg-countermeta .count{font-size:30px;line-height:1;font-weight:800}
.kg-counteractions{display:grid;grid-template-columns:1fr 90px 1fr 90px;gap:10px;margin-top:12px}
.kg-counteractions .btn-inc{background:#2aa689;border-color:#3bb89d;color:#fff}
.kg-counteractions .btn-dec{background:#823141;border-color:#a34457;color:#fff}
.kg-extraout{margin-top:12px;min-height:120px}
@media (max-width:700px){
  .fetch-grid{grid-template-columns:1fr 1fr}
}
@media (max-width:560px){
  .fetch-grid{grid-template-columns:1fr}
  .kg-countergrid{grid-template-columns:1fr}
  .kg-counteractions{grid-template-columns:1fr 74px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header header-no-lang">
    <a class="home" href="index.html" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
</div>

  <div class="card">
    <div class="fetch-grid">
      <div class="field">
        <label id="lblStart" for="startDT"></label>
        <input id="startDT" class="num" type="datetime-local" />
      </div>
      <div class="field">
        <label id="lblEnd" for="endDT"></label>
        <input id="endDT" class="num" type="datetime-local" />
      </div>
    </div>
    <div class="fetch-actions" style="margin-top:12px">
      <button class="full fetch-primary" id="runBtn"></button>
    </div>
    <div class="fetch-status" id="status"></div>
  </div>

  <div class="card copywrap" style="margin-top:12px">
    <textarea class="ta" id="out" placeholder=""></textarea>
  </div>


  <div class="card kg-extra">
    <div class="field">
      <select id="kgObjectSelect" class="kg-select" aria-label="Объект"></select>
    </div>
    <div class="kg-countergrid">
      <div class="kg-countercard">
        <div class="kg-countermeta">
          <div class="label" id="kgFreeLabel">Бесплатные</div>
          <div class="count" id="kgFreeCount">0</div>
        </div>
      </div>
      <div class="kg-countercard">
        <div class="kg-countermeta">
          <div class="label" id="kgPaidLabel">Платные</div>
          <div class="count" id="kgPaidCount">0</div>
        </div>
      </div>
    </div>
    <div class="kg-counteractions">
      <button class="full btn-inc" id="kgFreeInc">+1</button>
      <button class="full small btn-dec" id="kgFreeDec">−1</button>
      <button class="full btn-inc" id="kgPaidInc">+1</button>
      <button class="full small btn-dec" id="kgPaidDec">−1</button>
    </div>
    <textarea class="ta kg-extraout" id="kgOut"></textarea>
  </div>

</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const KOROGLU_BASE = 'https://bhk.parqour.com';
const YANVAR20_BASE = 'https://bh20.parqour.com';
const LSTR_KEY = 'autofetch_range';
const AUTO_TICK_MS = 30000;
const t = {
  ru: {
    start:'Начало', end:'Конец', run:'Загрузить и скопировать', copied:'Скопировано!', running:'Получаю данные…', ready:'Данные получены и скопированы.',
    failed:'Не удалось получить данные.',
    placeholder:'Готовый текст появится здесь…',
    cors:'Запрос заблокирован.', free:'Бесплатные', paid:'Платные', extraPlaceholder:''
  },
  az: {
    start:'Başlanğıc', end:'Son', run:'Yüklə və kopyala', copied:'Kopyalandı!', running:'Məlumatlar yüklənir…', ready:'Məlumatlar alındı və kopyalandı.',
    failed:'Məlumatları almaq olmadı.',
    placeholder:'Hazır mətn burada görünəcək…',
    cors:'Sorğu bloklandı.', free:'Pulsuz', paid:'Ödənişli', extraPlaceholder:''
  }
};
const $ = (id) => document.getElementById(id);
const lang = () => (window.__lang === 'az' ? 'az' : 'ru');
const tr = (k) => (t[lang()] || t.ru)[k] || k;
const OBJECTS = [
  {
    base: KOROGLU_BASE,
    title: 'Браво Короглу',
    parkingLine: 'На парковкe',
    freeLine: 'Закрытиe бесплатных сессий:0',
    paidLine: 'Закрытие платных сессий:0'
  },
  {
    base: YANVAR20_BASE,
    title: 'Браво 20 январ',
    parkingLine: 'На парковке',
    freeLine: 'Бесплатный сессии закрыто:0',
    paidLine: 'Платных сессий закрыто:0'
  }
];

const KG_OBJECTS = [
  { id:'draft_object', name:'Obyekt sonra əlavə olunacaq', reportRu:'' }
];
const KG_CURRENT_KEY = 'koroglu_report_counter_current';
function kgCountKey(type, objectId){ return `koroglu_report_${objectId}_${type}`; }
function kgGetCount(type, objectId){ return Number(localStorage.getItem(kgCountKey(type, objectId)) || '0'); }
function kgSetCount(type, objectId, value){ localStorage.setItem(kgCountKey(type, objectId), String(Math.max(0, value))); }
function kgGetCurrentId(){
  const saved = localStorage.getItem(KG_CURRENT_KEY);
  if(saved && KG_OBJECTS.some(o=>o.id===saved)) return saved;
  return KG_OBJECTS[0].id;
}
function kgSetCurrentId(id){ localStorage.setItem(KG_CURRENT_KEY, id); }
function kgCurrent(){ return KG_OBJECTS.find(o=>o.id===kgGetCurrentId()) || KG_OBJECTS[0]; }
function kgRenderSelect(){
  $('kgObjectSelect').innerHTML = KG_OBJECTS.map(object => `<option value="${object.id}">${object.name}</option>`).join('');
  $('kgObjectSelect').value = kgGetCurrentId();
}
function kgRenderCounts(){
  const current = kgCurrent();
  $('kgObjectSelect').value = current.id;
  $('kgFreeCount').textContent = kgGetCount('free', current.id);
  $('kgPaidCount').textContent = kgGetCount('paid', current.id);
}
function kgChange(type, delta){
  const current = kgCurrent();
  kgSetCount(type, current.id, kgGetCount(type, current.id) + delta);
  kgRenderCounts();
}
function kgBuildText(){
  $('kgOut').value = '';
}

function pad(n){ return String(n).padStart(2,'0'); }
function dtLocal(date){
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function getNearestShiftRange(now = new Date()){
  const points = [];
  for(let d=-1; d<=1; d++){
    const day = new Date(now.getFullYear(), now.getMonth(), now.getDate() + d, 0, 0, 0, 0);
    points.push(new Date(day.getFullYear(), day.getMonth(), day.getDate(), 8, 0, 0, 0));
    points.push(new Date(day.getFullYear(), day.getMonth(), day.getDate(), 20, 0, 0, 0));
  }
  let nearest = points[0];
  let best = Math.abs(now - nearest);
  for(const point of points){
    const diff = Math.abs(now - point);
    if(diff < best){
      best = diff;
      nearest = point;
    }
  }
  let start, end;
  if(nearest.getHours() === 20){
    start = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 8, 0, 0, 0);
    end = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 20, 0, 0, 0);
  }else{
    end = new Date(nearest.getFullYear(), nearest.getMonth(), nearest.getDate(), 8, 0, 0, 0);
    start = new Date(end.getTime() - 12 * 60 * 60 * 1000);
  }
  return { start, end };
}
function applyAutoShift(force = false){
  const range = getNearestShiftRange();
  const nextStart = dtLocal(range.start);
  const nextEnd = dtLocal(range.end);
  const changed = $('startDT').value !== nextStart || $('endDT').value !== nextEnd;
  if(force || changed){
    $('startDT').value = nextStart;
    $('endDT').value = nextEnd;
    saveRange();
    return true;
  }
  return false;
}
function loadDefaults(){
  applyAutoShift(true);
}
function saveRange(){
  localStorage.setItem(LSTR_KEY, JSON.stringify({start:$('startDT').value, end:$('endDT').value}));
}
function applyLang(){
  $('lblStart').textContent = tr('start');
  $('lblEnd').textContent = tr('end');
  $('runBtn').textContent = tr('run');
  $('out').placeholder = tr('placeholder');
  $('kgOut').placeholder = tr('extraPlaceholder');
  $('kgFreeLabel').textContent = tr('free');
  $('kgPaidLabel').textContent = tr('paid');
  $('toast').textContent = tr('copied');
  const btnRU = $('btnRU');
  const btnAZ = $('btnAZ');
  if(btnRU) btnRU.classList.toggle('active', lang()==='ru');
  if(btnAZ) btnAZ.classList.toggle('active', lang()==='az');
}
function setStatus(text){ $('status').textContent = text || ''; }
function showToast(text){
  const el = $('toast');
  el.textContent = text || tr('copied');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1500);
}
async function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = $('out');
  ta.focus();
  ta.select();
  document.execCommand('copy');
}
function withYear2020(startValue){
  if(!startValue) return startValue;
  return startValue.replace(/^\d{4}/, '2020');
}
function makeCarStatePayload(dateFromString, dateToString, inParking){
  return {
    draw: 1,
    columns: [
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'dimension',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'inTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'inGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'outTimestampString',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'outGate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'duration',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'function',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column:3,dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false},
    customFilters:{
      dateFromString,
      dateToString,
      plateNumber:'',
      amount:'',
      inGateId:'',
      outGateId:'',
      inParking:!!inParking,
      carOutType:'',
      carEntryType:''
    }
  };
}
function makeEventsPayload(){
  return {
    draw: 1,
    columns: [
      {data:'id',name:'',searchable:false,orderable:true,search:{value:'',regex:false}},
      {data:'plateNumber',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'created',name:'',searchable:true,orderable:true,search:{value:'',regex:false}},
      {data:'description',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'eventType',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'gate',name:'',searchable:true,orderable:false,search:{value:'',regex:false}},
      {data:'imgUrl',name:'',searchable:true,orderable:false,search:{value:'',regex:false}}
    ],
    order:[{column:0,dir:'desc'}],
    start:0,
    length:10,
    search:{value:'',regex:false}
  };
}
async function postJson(base, url, payload, refererPath){
  const headers = {
    'accept':'application/json, text/javascript, */*; q=0.01',
    'content-type':'application/json',
    'x-requested-with':'XMLHttpRequest'
  };
  const extra = {};
  try{ extra.referrer = base + refererPath; }catch(e){}
  let res;
  try{
    res = await fetch(url, {
      method:'POST',
      credentials:'include',
      mode:'cors',
      headers,
      body: JSON.stringify(payload),
      ...extra
    });
  }catch(err){
    const e = new Error(tr('cors'));
    e.cause = err;
    throw e;
  }
  if(!res.ok){
    throw new Error(`HTTP ${res.status}`);
  }
  return res.json();
}
function extractCount(obj){
  if(obj && typeof obj.recordsFiltered === 'number') return obj.recordsFiltered;
  if(obj && typeof obj.recordsTotal === 'number') return obj.recordsTotal;
  if(obj && Array.isArray(obj.data)) return obj.data.length;
  return 0;
}
async function fetchObjectStats(cfg, start, end){
  const parkingStart = withYear2020(start);
  const normal = await postJson(cfg.base, `${cfg.base}/rest/carstate`, makeCarStatePayload(start, end, false), '/journal/list?lang=ru');
  const inside = await postJson(cfg.base, `${cfg.base}/rest/carstate`, makeCarStatePayload(parkingStart, end, true), '/journal/list?lang=ru');
  const manual = await postJson(cfg.base, `${cfg.base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=`, makeEventsPayload(), '/events/list?lang=ru');
  const notFound = await postJson(cfg.base, `${cfg.base}/rest/events?dateFromString=${encodeURIComponent(start)}&dateToString=${encodeURIComponent(end)}&plateNumber=&gateId=&eventType=MANUAL_GATE_OPEN&reasonId=1`, makeEventsPayload(), '/events/list?lang=ru');
  return {
    period: extractCount(normal),
    notFound: extractCount(notFound),
    inParking: extractCount(inside),
    manualOpen: extractCount(manual)
  };
}
function formatRuBlock(cfg, stats){
  return [
    cfg.title,
    `Машин за период:${stats.period}`,
    `Не найдены:${stats.notFound}`,
    `${cfg.parkingLine}:${stats.inParking}`,
    `Ручных открытий:${stats.manualOpen}`,
    cfg.freeLine,
    cfg.paidLine
  ].join('\n');
}
function formatRuDate(value){
  const [d,t] = value.split('T');
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y} ${t}`;
}
function formatRuReport(start, end, results){
  return [
    formatRuDate(start),
    formatRuDate(end),
    '',
    formatRuBlock(OBJECTS[0], results[0]),
    '',
    formatRuBlock(OBJECTS[1], results[1]),
    '',
    '',
    'Тикеты: 0'
  ].join('\n');
}
async function runFetch(){
  const start = $('startDT').value;
  const end = $('endDT').value;
  if(!start || !end){ setStatus(''); return; }
  saveRange();
  setStatus(tr('running'));
  $('runBtn').disabled = true;
  try{
    const results = [];
    for(const cfg of OBJECTS){
      results.push(await fetchObjectStats(cfg, start, end));
    }
    const text = formatRuReport(start, end, results);
    $('out').value = text;
    await copyText(text);
    setStatus(tr('ready'));
    showToast(tr('copied'));
  }catch(err){
    console.error(err);
    const msg = err && err.message ? err.message : tr('failed');
    setStatus(msg);
    $('out').value = 'ERROR\n\n' + msg;
  }finally{
    $('runBtn').disabled = false;
  }
}
loadDefaults();
applyLang();
$('runBtn').addEventListener('click', runFetch);
$('startDT').addEventListener('change', saveRange);
$('endDT').addEventListener('change', saveRange);

kgRenderSelect();
kgRenderCounts();
kgBuildText();
$('kgObjectSelect').addEventListener('change', (e)=>{ kgSetCurrentId(e.target.value); kgRenderCounts(); kgBuildText(); });
$('kgFreeInc').addEventListener('click', ()=>kgChange('free', 1));
$('kgFreeDec').addEventListener('click', ()=>kgChange('free', -1));
$('kgPaidInc').addEventListener('click', ()=>kgChange('paid', 1));
$('kgPaidDec').addEventListener('click', ()=>kgChange('paid', -1));

const refreshShiftIfNeeded = () => {
  if(document.visibilityState === 'hidden') return;
  applyAutoShift(false);
};
window.addEventListener('focus', refreshShiftIfNeeded);
document.addEventListener('visibilitychange', refreshShiftIfNeeded);
window.addEventListener('pageshow', refreshShiftIfNeeded);
setInterval(refreshShiftIfNeeded, AUTO_TICK_MS);
</script>
<script src="pwa-update.js?v=20260410fix7"></script>
</body>
</html>
