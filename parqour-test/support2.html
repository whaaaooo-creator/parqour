<!doctype html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parqour">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Parqour — Support 2</title>
<link rel="stylesheet" href="style.css?v=20">
<script src="i18n.js"></script>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-startup-image" href="splash-2048x2732.png" media="(orientation: portrait)">
</head>
<body>
<div class="container">
  <div class="header">
    <a class="home" href="index.html?v=20260410fix7" aria-label="Главная">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </a>
    <img src="parqour.png" alt="Parqour">
  </div>

  <input id="startDT" type="hidden" />
  <input id="endDT" type="hidden" />

  <div class="card reportcard">
    <div class="reportactions">
      <button class="clearfab" id="resetAll" aria-label="Сбросить счётчики" title="Сбросить счётчики"><svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v11zm3.5-8h1.5v7h-1.5v-7zm5 0H16v7h-1.5v-7z"/><path d="M9 4V3h6v1h5v2H4V4h5z"/></svg></button>
      <button aria-label="Обновить" class="updatefab" id="updateNow" title="Обновить"><svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5 0 1.05-.32 2.02-.86 2.83l1.46 1.46C18.54 16.08 19 14.59 19 13c0-3.87-3.13-7-7-7zm-5 3.17C5.46 7.92 5 9.41 5 11c0 3.87 3.13 7 7 7v3l4-4-4-4v3c-2.76 0-5-2.24-5-5 0-1.05.32-2.02.86-2.83L6.4 9.17z"/></svg></button>
      <button aria-label="Копировать" class="copyfab" id="copy" title="Копировать"><svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path d="M15 3H7a2 2 0 0 0-2 2v10h2V5h8V3z"/><path d="M19 7H11a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm0 12H11V9h8v10z"/></svg></button>
    </div>

    <h4 class="colhead" id="pageHead" style="margin-bottom:12px">Support 2</h4>

    <div class="support2single">
      <label class="support2pickerlabel" id="objectLabel" for="objectSelect">Объект</label>
      <div class="support2pickerwrap">
        <select id="objectSelect" class="support2select" aria-label="Объект"></select>
      </div>

      <div class="support2card single">
        <div class="support2split compact single">
          <div class="support2side compact">
            <div class="support2meta compact">
              <div class="label" id="freeLabel">Бесплатные</div>
              <div class="count" id="freeCount">0</div>
            </div>
            <div class="support2buttons compact">
              <button class="full btn-inc" id="freeInc">+1</button>
              <button class="full btn-dec" id="freeDec">−1</button>
            </div>
          </div>
          <div class="support2side compact">
            <div class="support2meta compact">
              <div class="label" id="paidLabel">Платные</div>
              <div class="count" id="paidCount">0</div>
            </div>
            <div class="support2buttons compact">
              <button class="full btn-inc" id="paidInc">+1</button>
              <button class="full btn-dec" id="paidDec">−1</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card copywrap" style="margin-top:12px">
    <textarea class="ta" id="out" placeholder="Текст появится здесь…"></textarea>
  </div>
</div>
<div class="toast" id="toast">Скопировано!</div>

<script>
const LANG={
  ru:{title:'Support 2',copy:'Копировать',copied:'Скопировано!',update:'Обновить',updated:'Обновлено!',reset:'Сбросить счётчики',resetAsk:'Сбросить все счётчики Support 2?',resetDone:'Счётчики сброшены!',free:'Бесплатные',paid:'Платные',placeholder:'Текст появится здесь…',object:'Объект'},
  az:{title:'Support 2',copy:'Kopyala',copied:'Kopyalandı!',update:'Yenilə',updated:'Yeniləndi!',reset:'Sayğacları sıfırla',resetAsk:'Support 2 sayğaclarının hamısı sıfırlansın?',resetDone:'Sayğaclar sıfırlandı!',free:'Pulsuz',paid:'Ödənişli',placeholder:'Mətn burada görünəcək…',object:'Obyekt'}
};
const T=(k)=>((LANG[window.__lang]||LANG.ru)[k] || (LANG.ru[k] || k));
const $ = (id)=>document.getElementById(id);
const OBJECTS = [
  {id:'east_park', name:'East Park', reportRu:'Ист Парк'},
  {id:'konqres', name:'Konqres', reportRu:'Конгрес'},
  {id:'jale_plaza', name:'Jalə Plaza', reportRu:'Джаля Плаза'},
  {id:'bakixanov_mall', name:'Bakıxanov mall', reportRu:'Бакиханов молл'},
  {id:'parkspot', name:'Parkspot', reportRu:'Паркспот'},
  {id:'univerium', name:'Univerium', reportRu:'Универиум'},
  {id:'liv_bona_dea', name:'Liv Bona Dea', reportRu:'Лив Бона Деа'}
];
const CURRENT_OBJECT_KEY = 'support2_current_object';

function countKey(type, objectId){ return `support2_${objectId}_${type}`; }
function getCount(type, objectId){ return Number(localStorage.getItem(countKey(type, objectId)) || '0'); }
function setCount(type, objectId, value){ localStorage.setItem(countKey(type, objectId), String(Math.max(0, value))); }
function getCurrentObjectId(){
  const saved = localStorage.getItem(CURRENT_OBJECT_KEY);
  if(saved && OBJECTS.some(o=>o.id===saved)) return saved;
  return OBJECTS[0].id;
}
function setCurrentObjectId(objectId){ localStorage.setItem(CURRENT_OBJECT_KEY, objectId); }
function getCurrentObject(){ return OBJECTS.find(o=>o.id===getCurrentObjectId()) || OBJECTS[0]; }
function resetAllCounts(){
  for(const object of OBJECTS){
    localStorage.removeItem(countKey('free', object.id));
    localStorage.removeItem(countKey('paid', object.id));
  }
}
function migrateLegacyCounts(){
  const legacy = [
    ['1','east_park'],
    ['2','konqres'],
    ['3','jale_plaza'],
    ['4','bakixanov_mall'],
    ['5','parkspot'],
    ['6','univerium'],
    ['7','liv_bona_dea']
  ];
  for(const [oldIndex, objectId] of legacy){
    for(const type of ['free','paid']){
      const oldKey = `support2_${type}_${oldIndex}`;
      const newKey = countKey(type, objectId);
      const oldVal = localStorage.getItem(oldKey);
      const newVal = localStorage.getItem(newKey);
      if(oldVal !== null && newVal === null){
        localStorage.setItem(newKey, oldVal);
      }
      localStorage.removeItem(oldKey);
    }
  }
}
function pad(n){return n.toString().padStart(2,'0')}
function fmt(d){return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function atTime(date,h,m){return new Date(date.getFullYear(),date.getMonth(),date.getDate(),h,m,0,0)}
function computeShift(){
  const now=new Date();
  const startToday=atTime(now,13,0);
  const endToday=atTime(now,21,0);
  let start,end;
  if(now < startToday){
    const y=new Date(now); y.setDate(now.getDate()-1);
    start=atTime(y,13,0);
    end=atTime(y,21,0);
  } else {
    start=startToday;
    end=endToday;
  }
  $('startDT').value=fmt(start);
  $('endDT').value=fmt(end);
}
function showToast(key){
  const toast=$('toast');
  toast.textContent=T(key);
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toast.classList.remove('show'),1500);
}
function renderObjectSelect(){
  const select = $('objectSelect');
  select.innerHTML = OBJECTS.map(object => `<option value="${object.id}">${object.name}</option>`).join('');
  select.value = getCurrentObjectId();
}
function renderCurrentObject(){
  const current = getCurrentObject();
  $('objectSelect').value = current.id;
  $('freeCount').textContent = getCount('free', current.id);
  $('paidCount').textContent = getCount('paid', current.id);
}
function buildText(){
  const lines = [$('startDT').value.trim(), $('endDT').value.trim()];
  let hasEntries = false;
  for(const object of OBJECTS){
    const freeValue = getCount('free', object.id);
    const paidValue = getCount('paid', object.id);
    if(freeValue === 0 && paidValue === 0) continue;
    const parts = [];
    if(freeValue > 0) parts.push(`Бесплатные ${freeValue}`);
    if(paidValue > 0) parts.push(`Платные ${paidValue}`);
    lines.push('', object.reportRu, parts.join(' | '));
    hasEntries = true;
  }
  if(!hasEntries) lines.push('');
  $('out').value = lines.join('\n');
}
function applyLang(){
  $('pageHead').textContent = T('title');
  $('objectLabel').textContent = T('object');
  $('freeLabel').textContent = T('free');
  $('paidLabel').textContent = T('paid');
  $('copy').setAttribute('title', T('copy'));
  $('copy').setAttribute('aria-label', T('copy'));
  $('updateNow').setAttribute('title', T('update'));
  $('updateNow').setAttribute('aria-label', T('update'));
  $('resetAll').setAttribute('title', T('reset'));
  $('resetAll').setAttribute('aria-label', T('reset'));
  $('out').setAttribute('placeholder', T('placeholder'));
  $('objectSelect').setAttribute('aria-label', T('object'));
}
function changeCount(type, delta){
  const current = getCurrentObject();
  setCount(type, current.id, getCount(type, current.id) + delta);
  renderCurrentObject();
  buildText();
}

$('objectSelect').addEventListener('change', (e)=>{
  setCurrentObjectId(e.target.value);
  renderCurrentObject();
});
$('freeInc').addEventListener('click', ()=>changeCount('free', 1));
$('freeDec').addEventListener('click', ()=>changeCount('free', -1));
$('paidInc').addEventListener('click', ()=>changeCount('paid', 1));
$('paidDec').addEventListener('click', ()=>changeCount('paid', -1));
$('updateNow').addEventListener('click', ()=>{ computeShift(); buildText(); showToast('updated'); });
$('resetAll').addEventListener('click', ()=>{
  if(!confirm(T('resetAsk'))) return;
  resetAllCounts();
  renderCurrentObject();
  buildText();
  showToast('resetDone');
});
$('copy').addEventListener('click', async ()=>{
  const text = $('out').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    $('out').focus();
    $('out').select();
    document.execCommand('copy');
  }
  showToast('copied');
});

migrateLegacyCounts();
renderObjectSelect();
applyLang();
computeShift();
renderCurrentObject();
buildText();
window.addEventListener('focus', ()=>{ computeShift(); buildText(); renderCurrentObject(); });
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible'){ computeShift(); buildText(); renderCurrentObject(); } });
setInterval(()=>{ computeShift(); buildText(); }, 60000);
</script>
<script src="pwa-update.js?v=20260410fix7"></script>
</body>
</html>
